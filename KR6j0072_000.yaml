front:
  text: 佛説陀羅尼集經翻譯序若夫陀羅尼印壇法門者斯乃衆經之心髓引萬行之導首宗深祕密非淺識之所知義趣沖玄匪思慮之能測密中更密無得稱焉有高德沙門厥號阿地瞿多唐言無極高也是中天竺人也法師聰慧超群德邁過人弱冠慕道歷五竺而尋友低心躍步而咨法要故能精練五明妙通諸部意欲運西域之法水潤東夏之渴仰判身許于險難務存弘道之心跋山巖而不疲涉沙流而無倦頂戴尊經向斯漢地永徽二年正月屈于長安奉敕住慈門寺但法師含珠未吐人莫別于懷珍雅辨既宣方知有寶云云故能決衆疑言皆當理然則經律論業傳者非一唯此法門未興斯土所以丁寧三請方許壇法三月上旬赴慧日寺浮圖院內法師自作普集會壇大乘琮等一十六人爰及英公鄂公等一十二人助成壇供同願皇基永固常臨萬國庶類同沾皆成大益其中靈瑞恐繁不述別在傳記余慶逢此法不勝欣躍躬詣翻經所悕翻廣本屢值事鬧不及陳請恐幻質遷謝失于大利便請法師于慧日寺宣譯梵本且翻要抄一十二卷竪興國之洪基存隆民之祕寶歟從四年三月十四日起首至永徽五年歲次甲寅四月十五日畢以後頻頻敕追法師入內邂逅之間無暇復校此經出金剛大道場經大明呪藏分之少分也今此略抄擬勘詳定奏請流通天下普聞焉
