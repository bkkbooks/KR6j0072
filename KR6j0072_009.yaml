body:
  text: 大唐天竺三藏阿地瞿多譯金剛烏樞沙摩法印呪品烏樞沙摩二合護身法印呪第一唐云不淨潔金剛印有十七呪有四十二兩手掌向身相叉中指及無名指頭博著掌上小指斜竪頭相拄屈二頭指相鉤右壓左屈二大指捻頭指上節橫文呪曰唵一跋折囉二俱嚕馱三摩訶娑去音羅四訶那馱訶五跛者毗馱崩二合寫夜六烏樞沙摩二合七俱嚕馱八嗚𤙖㧊九是法印呪若人欲作火頭法事先以此印誦呪七遍護身然後行用烏樞沙摩法皆悉有驗用此印呪治一切病誦十萬遍然後行用烏樞沙摩身印呪第二以右手無名指小指從左手無名指背後入中指無名指岐間以右大指押右無名小指甲上握左無名指小指次屈左無名小指復以左大指押左無名小指甲上作環相鉤各竪兩頭指及中指頭相拄頭指來去呪曰唵一跛折囉二俱嚕馱三摩訶婆去音囉四訶那馱去音訶五跛者毗枳囉六毗馱崩二合寫夜七闍置囉八藍蒲陀囉九烏樞沙摩二合十俱嚕馱十一嗚𤙖㧊㧊十二莎訶十三是法印呪若入道場作法之時日日供養皆以此印護身結界已還用此印喚請金剛若欲取驗於清淨處燒安悉香七日七夜誦是呪滿十萬遍已一切皆驗兼用治病亦得效驗治病時節從平旦一上日中一上黃昏一上每日如是三時各誦一千八遍或誦一百八遍亦得除此三時不得浪誦若誦持時不作遍數惟多彌好別受餘福一百日內更不得出道場外宿行淫破戒若破戒行衆神不護不助其力亦無大驗若欲出行大小便時勿著淨衣上廁食時亦爾若大小便及喫食竟必須香湯淨灑浴已還著淨衣入道場中誦持本業若欲對面親見金剛乞願之時每夜作軍茶利歡喜法者必定得見行者當見金剛之時勿生恐懼若心怖畏即令其人失心荒亂所以者何其人若能使得金剛即能制伏一切鬼神是故一切諸鬼神等見其臨欲成就大驗來相恐怖令其退壞當須強心牢固其志勿心動轉求見身法如下所說此呪乃是八部鬼神皆悉集會異口同說不問吉凶黑白二月齊與不齊若淨不淨食與不食先誦是呪滿十萬遍即得法成一切所求皆悉得力又用白汁木柴然火又取此木細枝截為一千八段長短隨意段別皆共白芥子呪各呪一遍投火中燒如是數滿一千八遍即得貴勝上至天王皆悉歡喜又法不問淨與不淨若晝若夜但誦呪滿三十萬遍即一切處無有障礙仍用胡麻和酥相攪取其少分呪一遍已投火中燒如是滿足一千八遍即呪法成又法高山頂上更誦是呪滿十萬遍一切去處但作𤙖𤙖彈指作聲更無惡人而能當頭為作障惱又法每日平旦日中黃昏三時各誦一百八遍夜眠臥時諸天愛護一切諸人亦常愛念又法但是一切鬼神病者以石榴枝呪三七遍用打病人其病即差烏樞沙摩結界法印呪第三準前大護身印惟開二頭指於中指背後離三分許呪曰那上音謨上音室旃二合茶跋折囉波拏曳一摩訶藥叉栖那跋跢曳二跢姪他三唵四薩囉毗薩囉五尼文者醯上音六那吒那吒七薩哩毗薩哩八伽上音鞞毗伽上音鞞九阿去音車底迦十攝跋二合遰那十一莎訶十二是法印呪若作法事以此印結四方上下虛空等界呪三七遍若用是法治病誦呪二十一遍彈指亦應二十一遍去病有驗若人夜臥心驚怖者亦如上法呪三七遍二十一遍彈指臥者永無驚怖烏樞沙摩歡喜法印呪第四以左手大指屈指頭拄無名指第三節文以四指作拳呪曰唵一攝跋二合囉二攝跋二合囉三承伽摩夜四承伽摩夜五迦羅迦羅六婆羅婆羅七呵羅呵羅八娑羅娑羅九鉢羅鉢羅十社羅社羅十一末羅末羅十二娑羅娑羅十三莎訶十四是法印呪若作火頭金剛法用誦呪之時護身結界請喚火頭金剛安置先作此印誦呪即得一切歡喜若有人患惡瘡者以此印摩瘡上誦呪其瘡即差持此印呪一切行處不作留難一切諸人見者歡喜若食毒藥當作此印繞身頭上誦呪即差烏樞沙摩供養法印呪第五準前身印惟改以二頭指捻中指甲際上呪曰唵一跋折囉俱嚕馱二摩訶婆去音羅三唵四入鞞入鞞五摩訶入鞞六主羅主羅七企羅企羅八娑羅娑羅九訶羅訶羅十馱訶馱訶十一莎訶十二是法印呪欲作法事請喚火頭金剛安置當作此印誦呪供養即得種種利益有驗烏樞沙摩治鬼病印呪第六一名殺鬼印呪準前身印唯改以右頭指中指向內揩之左頭指中指頭呪曰唵一跋攝囉俱嚕馱二摩訶婆羅三囉上音怛那二合毗補史多二合四奢唎囉去音夜五瞋陀瞋陀六嗚𤙖㧊七莎訶八是法印呪呪師若欲治病去時先以右手無名指大指捻取淨灰呪七遍已點自頂上眉間喉上左膊右膊及點心下護身而去與治病已然後於彼病人身上依如前法與作護身病鬼不得近病人邊亦不得入其家門戶烏樞沙摩跋折囉法印呪第七準前身印惟改二頭指屈各向掌中垂下入頭呪曰唵一跋折囉俱嚕馱二摩訶婆去音羅三儞羅婆薩那去音耶四鉢羅涉筏二合哩多五摩鉤吒夜六涉筏二合哩多七儞多羅去音夜八底哩補羅耶伽去音羅九毗馱崩二合娑上音夜十迦羅去音夜十一跢波跢波十二鉢羅鉢羅十三涉筏二合囉涉筏二合囉十四烏迦上音目佉十五普吒普吒十六娑囉娑囉十七毗娑囉毗娑囉十八烏底瑟吒二合烏底瑟吒二合十九婆伽毗二十烏樞沙摩二合俱嚕馱二十一阿謨迦上音寫稱他名二十二涉筏二合哩拏二十三訖柳二合噓拏二合二十四莎訶二十五是法印呪若欲除病可作此印印其病上數數誦呪聲聲相續可滿千遍病即止差又呪燒死人灰一百八遍即散於惡比止門底人踏行之即著熱病若欲放差取黑沙糖呪三七遍抄比止名燒即得差又法欲入阿修羅宮殿當誦此呪二十萬遍即能得入又法呪牛乳蘇火燒并抄病人名燒火中其病即差又法毒藥人血相和一呪一燒一百八遍一切鬼死又取苦楝葉一呪一燒一百八遍一切鬼病皆得除差烏樞沙摩擲法印呪第八準前身印惟改屈二頭指中節相向垂頭呪曰唵一跋折囉俱嚕馱二摩訶婆去音羅三鉢囉摩馱嚕那四摩迦囉目佉五多吒多吒六毗摩毗摩底夜二合七阿伽上音茶阿伽上音茶訶上音八羅訶上音羅九囉上音羅囉上音羅十多波多波十一多跛夜多跛夜十二莎訶十三是法印呪若欲治病呪師可作此印誦呪病人宅中呪白芥子二十一遍周匝散之以為結界然後作水壇壇中心著盛五穀瓫言五穀者一粟二大麥三青稞四小豆五稻穀皆擬後用著數槃食十六盞燈次喚病人於壇外坐其壇中心著一火爐呪師作印把白芥子以繞病人頭上一匝一呪一燒二十一遍後將水碗來著壇上取火燒殘白芥子并灰及與少許飲食相和著水碗中寫於壇上五穀器中即輿此器出外㧊與鬼神食竟口云令此人病差訖然後發遣其病即差烏樞沙摩羂索法印呪第九準前身印惟改頭指苾在中指後頭相拄呪曰唵一阿儞尼二摩儞尼三訖儞尼二合噓拏二合杜範補甘反四莎訶五是法印呪若欲除病知是鬼神所為不降伏者可作此法誦呪縛之當即遠送去後與作結界法事所病鬼神更不得入烏樞沙摩輪法印呪第十左右頭指無名指向內交叉左右中指竪頭相拄大指小指舒之頭相拄開腕呪曰唵一跋折囉俱嚕馱二摩訶婆去音羅三涉婆二合上羝氷揭禮四鉢羅娑囉去音夜五鉢羅婆囉六莎訶七是法印呪若人患冷病呪師手把草火火上㧊米粉等法用具如軍茶利法又以此火於病人宅四邊繞之數數誦呪為結界者其病即差烏樞沙摩大身斧法印呪第十一起立地屈左膝以左手把右腳大指其肘節即當膝上安置其身端立右手作斧印印中把斧大指當斧柯屈肘印當乳房去乳五寸許若無斧者直作斧印亦得呪曰唵一跋折囉俱嚕馱二摩訶婆羅三𠼝婆去音瑜四摩訶曼𠼝耶五婆羅跋羅六迦囉摩七婆上音羅婆去音羅八鉢羅娑羅去音夜九莎訶十是法印呪若人卒患氣疰鬼疰背氣背膊重等病可作此印誦呪打其所痛之處當時即差烏樞沙摩矟法印呪第十二準前身印惟改頭指捻中指上節上呪曰唵一跋折囉俱嚕馱二摩訶婆去音羅三跢姪他四醫去音醯上音醫醯五迦比囉氷揭囉六屋伽囉帝闍上音七忘輕音娑輸儞跢八部社那布嚕槃上音多婆九室㘓訖柳二合噓拏二合十薩婆迦閻十一阿杜那十二毗杜那十三涉筏二合唎涉筏二合唎十四摩訶涉筏二合唎十五阿目劍平音十六涉筏二合唎拏十七訖柳二合噓拏十八二合渴去音伽手羅十九馱奴達囉二十普吒普吒二十一普吒夜普吒夜二十二阿謨迦上音寫稱他某甲二十三薩婆奢唎㘓二十四阿杜那二十五毗杜那二十六薩婆馱去音敦二十七涉筏二合囉去音夜二十八孤婆夜二十九莎訶三十是法印呪若欲除病病人邊作四肘水壇壇中心著一盤飲食東南北方各一盤食呪師坐西方呪師左邊令病人坐呪師前復安火爐燒白芥子一呪一燒一百八遍其病即差若一日不差三日作法決定得差如其不差知非鬼病宜白日作勿夜作法烏樞沙摩像一軀南邊安置火爐取白芥子及赤色華并自身血少分交和欲令舍覩嚕熱病困者以前件藥一呪一燒一百八遍舍覩嚕即困若欲令差取沙糖和水及與白華一呪一燒一百八遍稱其那去音摩遍遍皆稱著者即差以後毒心自然消滅烏樞沙摩頭法印呪第十三準前身印惟改右頭指捻中指上節上左手頭指開向中指前曲之呪曰唵一安那梨二俱那梨三訖哩二合瑟拏二合氷揭梨四蘇薄雞五訖嚧二合多婆薩泥六莎訶七是法印呪悉能療治一切鬼病大大速驗烏樞沙摩頂法印呪第十四未見功能準前頭印惟改左食指壓中指外第二節文呪曰那上音謨伽莫都一跋折囉俱嚕馱寫二唵三騫伽唎雞四徒摩施溪五莎訶六烏樞沙摩口法印第十五準前身印惟改左頭指向左中指後少曲右頭指向右中指前少曲之呪用前供養呪是法印呪若婦人産腹中兒死不得出者手掬取少水和少許阿魏藥誦前供養呪一百八遍與其令服死兒即出烏樞沙摩跋折囉母瑟知法印呪第十六左手大指捻無名指下節以餘四指握作拳呪曰唵一跋折囉俱嚕馱二摩訶婆去音羅三婆嚧婆嚧四四離四離五娑摩娑摩六鉢羅婆訶訶上音七莎訶八唵九地力十嗚𤙖㧊十一是法印呪若作此印誦呪即得一切歡喜無所障礙烏樞沙摩解穢法印第十七以二小指相鉤掌中二無名中指食指直竪相博二大母指安在掌中二小指上合腕呪曰修利摩利一摩摩利摩利二修修利三莎訶四是法印呪印中著水呪七遍已灑面然後誦持諸餘呪法行呪法人若見死尸婦人産處六畜産生血光流處見如是等種種穢時即作此印誦解穢呪即得清淨所行呪法悉有效驗若不爾者令人失驗及被殃害面上生瘡解穢神呪必不得忘行者每日以香熏身於道場東壁張金剛像敷金剛淨座坐用吉祥草如無此草白茅代之呪師身著赤衣用赤坐具然後坐於菖蒲席上又取黃蔓菁子及白芥子呪七遍已散著四方一切惡鬼天魔之神不得嬈亂呪師向金剛前以兩手散赤色紫色二種色華散華呪第十八呪曰唵一蘇雞羅去音夜二莎訶三更有一本呪曰唵烏𤙖一涉筏二合囉去音耶二莎訶三烏樞沙摩大呪第十九呪曰那上音謨上音囉上音怛那二合跢囉二合夜耶一那謨同上室旃二合茶跋折囉波拏曳二摩訶藥叉栖那鉢跢曳三那謨跋折囉二合嚕陀寫四阿鉢囉二合底訶上音多五奢珊那上音寫六摩訶嚧山那上音寫七跋折囉檀曇八鉢囉二合𮑀叉上音二合彌九阿底俱嚕㘕去音十鉢囉二合摩馱路男上音十一氷伽㘕十二迦卑㘕具㘕十三摩