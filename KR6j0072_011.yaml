內用淨牛糞摩作圓壇隨意大小當取一升清胡麻油用上呪文呪其淨油一百八遍即暖其油以淨銅器盛著暖油然後將像放著油中安置壇內用淨銅匙若銅杓等𢍶油灌其二像身頂一百八遍以後日日更呪舊油一百八遍一日之中七遍灌之平旦四遍日中三遍共成七遍如是作法乃至七日隨心所願即得稱意正灌油時數數發願復用蘇蜜和作團及蘿蔔根并一盞酒如是日別新新供養一切善事隨意成就一切災禍悉皆消滅其所獻食必須自食始得氣力調和毗那夜迦法印呪第五十一作帝殊羅施印以二小指無名指相叉於掌內竪二中指頭相捻以二頭指各加中指背第一節下半分許即是喚一切天大指來去呪曰唵一鑠覩嚕二波囉摩馱儞曳三莎訶四調毗那夜迦法但是誦呪人夢中驚怖見諸畜生惡境界等當知是毗那夜迦鬼王瞋夢中覺已即慚愧乞莫瞋明日自有飲食勞謝謝法以水摩地作二肘水壇圓如盤大亦得取蒸餅五顆蘿蔔根三顆火燒熟有華著華并燒白膠熏陸香等安於壇中呪師壇西面向東坐誦大自在天呪一百八遍已口云慚愧好去如是語已壇中雜物盤盛出門向西棄却西北亦得口云薩婆藥叉囉闍阿藹捨訶娑鉢闍伽車作是語已棄却即歸大自在天呪曰唵一毗跢囉薩尼二波囉末唎達尼三瞋達尼四頻達尼五莎訶六誦一百八遍即心歡喜非但夢中但覺有魔事即作前法定好一切藥叉法印呪第五十二以右手四指向下鉤左手四指其二大指直努二大指來去呪曰唵一俱毗囉二莎去音訶三是法印呪若作大都法壇之時作此印呪喚入供食一切歡喜一切羅剎法印呪第五十三以右手大指捻小指無名指甲上餘三指皆竪大指來去呪曰唵一渴伽阿二合地波多曳二莎訶三是法印呪若作大都法壇之時作此印呪喚入供養一切歡喜爾時諸佛見是天龍八部諸鬼神王藥叉羅剎乾闥婆阿素洛等各獻神呪多諸利益成就希有大功德已而告衆言我皆印可不違本願任為方便護持正法不得輕慢我等正教憐愍一切衆生之類爾時諸天王等蒙佛印可皆大歡喜一時作禮心無退轉成就第一最勝功德
