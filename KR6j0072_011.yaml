body:
  text: 大唐天竺三藏阿地瞿多譯諸天等獻佛助成三昧法印呪品一時佛在毗富羅山大衆會中説諸金剛陀羅尼印祕密法藏神呪壇法於是會中有梵天王及天帝釋摩醯首羅日天月天星天地天四天大王火天等俱是諸天王各有無量諸眷屬俱共會説法又有無量天龍八部諸大鬼神藥叉羅剎諸眷屬等聞是金剛神通自在法呪功能各大驚怕莫知走處佛語止止汝等莫此金剛法藏大有利益汝等諦聽我為汝等説諸利益方便之事爾時天龍八部衆等聞佛説已心生歡喜各各慚愧悔諸罪過從座而起五體投地頭面禮敬前白佛言世尊我等眷屬各有一百一十二大將一一大將各領四萬藥叉眷屬一一藥叉各領四百萬億鬼神相共遊行娑婆世界滿諸國土常伺人便貪食血肉為諸橫難縱暴天下破壞正法欺誑三寶恆作不善我等愚癡不知諸佛慈悲憐愍一切衆生多諸利益我等眷屬各各不覺心口失念發大誓願歸佛法僧同諸天等獻是神呪助護三寶不敢違教從佛印可對佛菩薩金剛等前結諸要誓我等從衆所領眷屬在在處處如有寺舍道場講説大乘法輪及有誦持陀羅尼藏神呪印者所住之處若有惱亂反加殘害不相擁護我等眷屬即同欺犯負於三寶我等皆當未來之世誓願不得成佛道果願佛證明印可法呪我等亦當同諸佛等利益一切大梵摩天法印呪第一仰右手掌直申小指頭指屈無名指中指中節頭並向上竪之大指附於頭指側上大指來去呪曰唵一輸嚕二合致二悉彌哩三合致三陀囉上音尼四鳴𤙖訶上音五是法印呪若有人等受持此法修習是呪供養梵天欲得驗者日日洗手面訖先胡跪地於左腋中以俠澡罐罐口向前即以左手作此印已寫澡罐水盛印掌中口近其掌呪水三遍自飲水訖又更印中盛水以拭自口誦呪三遍又印中盛水呪之三遍即用水泮自右腳上次泮左腳上復以右手大指無名指捺自兩眼兩鼻口中右耳左耳竟向自頭上過手放之若是好事以頭指入中指頭大指兩指之間即以頭指向外放之出聲彈指若是惡事即以大指中指相捻出聲彈指作此法者種種得驗作法即成論義得勝若作都大道場之時亦作印呪喚梵天人助護供養如能日日誦呪供養一切佛等一切有驗帝釋天法印呪第二先仰兩手即以二無名指相鉤其二中指及二小指各向掌屈之二頭指各斜竪頭相拄以二大指亦斜竪附博頭指側大指來去呪曰唵一怯皤弭唎二合佉二怯皤伽弭唎二合佉三那羅阿姥腎穰二合四阿姥皤訶五阿佉殊姥佉六娑伽提七時那筏囉二合𠺒八莎去音訶九是法印呪若有人等受持是呪印等供養天帝者種種有驗若在佛前每日作意常供養者是人恆得諸天衛護一切歡喜摩醯首羅天法印呪第三合掌以二大指二頭指二小指皆相著竪即以右手中指叉在左手中指無名指芰出又以無名指復叉在左無名小指芰出以左手無名指叉在右手無名指中指芰出又以中指叉在右手頭指中指芰出二手指相叉以向外各博著手背節間大指來去呪曰唵一毗跢囉二合薩尼二波囉二合末平音陀去音尼三瞋陀去音尼四頻陀去音尼五莎去音訶六是法印呪若有人等日日受持此印誦呪供養摩醯首羅天者種種得驗每作是印誦呪供養諸佛之時一切佛等亦生歡喜兼療一切諸病有驗摩醯首羅天求馬古印呪第四右手屈中指最下節向掌內其餘二節直申又以無名指苾在中指背根又屈小指頭向掌中又屈頭指以中節文押無名指甲又屈大指以大指文押頭指甲以其大指頭復押小指甲呪曰唵一潛倍謀戲二莎去音訶三若人欲得求馬古者七日之中全不喫食日日作此印印中中指上以酥蜜塗之數數誦呪口云所求馬古名字急急來者至第七日即來打門夜時作法莫聽人知若晝日作牢閉門著莫聽人知又法以埿作四箇像形如天像長三四指何等為四一名闍夜二名毗闍夜三名阿自多四名阿婆囉自多又以埿作摩醯首囉天像中央安摩醯首羅右邊安闍夜及毗闍夜左邊安阿自多及阿婆羅自多前著火爐取貓兒屎此是西國鬼食餅名及人爪甲與人頭髮三種相和燒供養之數數作印并誦呪已口云所求馬古名字急急來看如是七日日日作法至第七日即來打門從心所願此法喫食亦無所苦於夜作法莫令人知若其晝日欲作法者牢閉門著莫令人見若事了竟收取其像藏著還用東方提頭賴吒天王法印呪第五側左手掌中指已下三指把捲又屈頭指中節頭亦小曲又以大指直斜申頭勿捻著頭指上右手亦同唯舉腕下著於左手臂上大指來去呪曰唵一地𠼝致囉上音瑟吒二合二囉囉囉三波囉二合末平音陀去音那四莎去音訶五南方毗嚕陀迦天王法印呪第六側左手腕以右腕側著左腕根上二掌相背以二中指相鉤申之如索以二小指二頭指二大指各曲之頭指來去呪曰唵一毗嚕陀迦二藥叉地波跢曳三莎去音訶四西方毗嚕博叉天王法印呪第七右手側腕以右手腕著於左手腕根上二手中指已下三指各屈在掌作捲屈二大指頭各押中指甲上以二頭指相交如索申之大指來去呪曰唵一毗嚕博叉那去音伽二地波跢曳三莎去音訶四北方毗沙門天王法印呪第八左手側腕屈頭指已下四指在掌中作捲又屈大指押頭指上右手腕亦側之作捲如左手法唯以大指直申向上於左手捲上纍著大指來去呪曰唵一吠賒囉二合麼那二檀那牝平音陀羅三莎去音訶四是四天王法印呪等若諸人輩受持諸佛般若菩薩金剛天等法呪之時因有供養都會道場法壇之所并作此印誦呪喚天安置供養即得一切人等歡喜是天王等過去亦曾供養十方一切諸佛及諸菩薩并金剛等其呪印法皆同諸佛之所印可并顯像法具諸相貌威侍佛所利益一切又四天王通心印呪第九二手頭中小三指反叉合掌二無名指竪頭相拄屈初節上二大指還向內捲中大指來去作是像已於道場北面向南邊作行安置竟呪師南坐面向北方即手作前法印各別作印各誦其呪一一喚之安置坐已燒安悉香種種供養次作通心印誦通心呪呪曰又四天王通心印呪第十呪用最後右手大指中指小指皆竪向上屈頭指無名指捲著掌上手掌向前屈肘向上不是別來去法呪曰那上音謨毗上音嚕茶上音迦上音夜一那麼毗上音嚕跛叉夜二那麼吠輕呼賒囉皤拏曳三那麼提唎二合底囉長音瑟吒二合囉夜四跢姪他五壇茶徒皆反陀壇茶六壇吒上音䶩壇吒䶩七跢摩唎八莎訶九若能清淨如法受持是法印呪四大天王將二十八部善神來詣道場助護行者治一切病七日呪之悉皆除差四天王像法提頭賴吒天王像法其像身長量一肘作身著種種天衣嚴飾極令精妙與身相稱左手申臂垂下把刀右手屈臂向前仰手掌中著寶寶上出光毗嚕陀迦天王像法其像大小衣服準前左手亦同前天王法申臂把刀右手執矟矟根著地毗嚕博叉天王像法其像大小衣服準前左手同前唯執矟異其右手中而把赤索毗沙門天王像法其像大小衣服準前左手同前執矟拄地右手屈肘擎於佛塔作是像已於道場北面向南邊作行安置竟呪師南坐面向北方即手作前法印誦呪一一喚之安置坐已燒安悉香種種供養及誦心呪呪曰唵一漸婆羅二謝輦陀羅夜三莎去音訶四是法印呪名四天王通心印呪若作像身於道場中日日作印對於像前誦上呪等及誦心呪得四天王歡喜垂恩若能誦呪滿十萬遍療病大驗多得錢財日天法印呪第十一先背兩手中指無名指小指等背竪使齊以二頭指斜直頭相拄以二大指側屈捻頭指側本節文大指來去呪曰唵一娑訶薩囉二囉上音濕迷二合三莎去音訶四是法印呪若有受持此印誦呪日日供養日天子者一切無病若在佛前為供養者諸佛歡喜日天子供養印第十二不見別呪右手無名指小指屈在掌中以大指捺無名指小指上節中指直竪少屈頭指指頭側著中指上節即以左手四指把腕大指把著右手腕背小指斜申屈右臂肘直向上竪月天法印呪第十三反叉二小指無名指在掌中右押左直竪上中指頭相著以二頭指各押中指第三節上以二大指各捻掌中無名指兩頭大指來去呪曰唵一住住鉢底二莎去音訶三是法印呪若作大道場都壇之時當作此印誦呪供養一切歡喜星宿天法印呪第十四先仰右手逆覆左手相叉以右手無名指頭齊押左手中指內根節以右中指押左無名指內根節復以左無名指逆纍押右中指內根節以左中指頭捻右無名指內根節總綟正如索以二小指直竪頭相拄以二頭指斜直頭相拄以二大指向身頭相拄開大指來去呪曰唵一那剎跢囉二提婆跢曳三莎去音訶四是法印呪若有呪師日日相續對於佛前每作此印誦呪供養者身常無病作都壇時亦通入數誦喚供養一切歡喜地天法印呪第十五合腕以二頭指及二小指反叉在掌中左押右以二中指及二無名指直竪頭相拄以二大指並竪押二頭指側大指來去呪曰唵一婆孫陀哩二陀那陀若三鉢囉二合婆上音囉怛二合上音儞四莎去音訶五是法印呪若有人等日日相續受持此印至心誦呪供養地天得一切珍寶若作都壇時亦通一位喚而供養一切歡喜火天法印呪第十六直竪右手後三指頭指少曲以大指屈在掌中頭指來去呪曰唵一阿耆那去音曳二訶弊毗治反歌弊同上下同三婆訶那去音夜四地弊地弊五地跋夜六莎去音訶七是法印呪呪師若作一切壇法供養之時先喚火天坐於火爐華座中已燒酥蜜等種種供養竟即移火天於火爐邊安置坐之然後以次請一切佛及請般若一一菩薩一一金剛并請天等安置火爐華座中已燒酥蜜等及以五穀種種華香并諸餅果香水等物而為供養竟一一次第還作本印誦其本呪而送本位供養遍已作發遣印而令散之火天子助呪師天驗印第十七右臂屈肘向上直竪頭指中指及無名指屈頭向掌頭勿著掌直竪大指捻頭指側閻羅王法身印呪第十八屈右手三指仍稍出頭指三分許以大指博附著頭指下節文頭指來去呪曰唵一閻摩囉闍二烏揭囉上音毗𠼝二合耶三阿揭車四莎去音訶五是法印呪若作大壇供養一切諸佛等時即作此印誦呪七遍其閻羅王即來受供心大歡喜一切龍王法身印呪第十九亦名優婆難陀龍王印以右肘頭在左肘內復以右手後四指少曲以大指博頭指少曲之左手反曲向右手上右手亦如是兩手相向狀如蛇口以二手四指開合來去呪用後呪又有龍王法身印第二十左右臂腕準前不改但以左右小指無名指反叉掌中右押左二中指直竪頭相拄以二食指拄中指背上節以二大指少曲各拄二食指內中節頭指來去同誦後呪呪曰唵一蒲祇蒲祇二蒲雞蒲伽跋底三嗚𤙖訶上音四是法印呪若作大會供養壇時即作此印誦呪喚入都壇會中同供養者即得一切皆悉歡喜若欲祈雨當具作壇供養作法依祈即得降雨便足五方龍王華座印第二十一不見別呪二手八指似曲不曲皆向上竪二小指頭相離二分二無名指及二中指頭各相離可二寸許二頭指頭相去四寸並竪大指二指相著五方龍王牙印第二十二不見別呪屈右臂肘直向上竪屈無名指小指在掌中指直竪又屈頭指指頭側著中指中節以大指捻頭指頭側祈雨法壇若欲乞雨可就國中四望勝地及好池泉有龍之處近其池側修理平淨方面各取正五十步著淨衣服置立道場竟當中心作十二肘壇八肘亦得其壇四方皆將皂布幕幃繞之上方亦覆於其幕內多懸皂幡又以五色粉繞四畔其壇界畔唯作一重而開四門壇之東門將以埿作一龍王身身長三肘一身