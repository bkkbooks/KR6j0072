body:
  text: 大唐天竺三藏阿地瞿多譯千轉觀世音菩薩心印呪第一與一切觀音菩薩心印呪同頭指以下四指反叉向內相捺左大指屈入頭指中間右大指舒直向內勿曲兩腕相合以右大指來去呪曰唵一阿嚕力二莎訶三若作此印法一切觀世音菩薩見之請觀世音坐作結界法燒香供養竟次作此印觀音歡喜日日作者大好益善又千轉印呪第二手印與前一切觀世音心印同惟足不同頭指以下四指反叉向內相捺左大指屈入頭指中右大指舒直向內勿曲兩腕相合兩脚作丁字形右脚丁頭左脚丁尾乃右脚直立左膝曲在外努𦜮身屈向左邊以心印當右乳前勿著乳面作笑顏頭面向右每月十五日香湯洒浴入於淨室而作此印誦後大呪四重五逆悉皆消滅千轉陀羅尼曰那上音謨囉上音怛那二合跢囉二合夜耶一那謨阿𠼝耶婆盧輕呼枳帝攝筏二合囉耶二菩提薩埵去音耶三摩訶薩埵去音耶四摩訶迦嚧尼迦去音耶五跢姪他六闍上音曳闍曳七闍上音夜婆醯上音儞八闍上音榆跢唎上九迦上音羅迦上音羅十麼羅麼羅十一者羅上音者羅上十二器拏器拏十三薩婆羯磨跋囉上音拏儞迷十四薄伽婆底都儞反娑上音訶上音薩囉薄羯底十五薩婆菩上音陀婆盧輕呼枳羝十六者芻上音眼十七輸上音嚕怛囉上音耳十八揭囉上音拏上音鼻十九是訶上音皤二十舌迦夜二十一身末弩二十二心毘上音輸達儞二十三素囉上音素囉上音二十四鉢囉上音素囉上音鉢囉上音素囉上音二十五薩婆菩上音陀阿上音地瑟恥二合羝莎訶二十六達麼陀去音覩揭囉上音鞞莎訶二十七阿上音婆皤二十八娑上音皤婆皤二十九達摩皤三十菩陀上音尼曳三十一莎訶三十二千轉經云誦此呪已惡業銷滅誦至七遍五逆罪滅若滿千遍已罪無不滅滿十萬遍面見觀音種種莊嚴者七日之中初作法時惟得食乳糜酥酪白餅粳米飯不得食鹽醬菜最後一日勿食十五日夜空腹佛前相續誦呪無定限數見像動搖出聲唱言善哉善哉放光明曜復以真珠寶物安呪師頂上即知成驗面見觀音已得滿一切善願又於睡眠中夢見觀音種種莊嚴者一切善事成就一切惡業銷滅直轉讀者亦得滅罪欲東西行時先呪手七遍以摩拭面所至之處無諸災橫若能清淨如法常誦不廢得第一地若有女人能誦持者後成男子更不重受如是女形先作壇安置供養備訖然始誦呪其壇四面各十六肘四重作規院相皆外白色內四色各一重如似壁勢即是八重也合五方色四面開門東西南北相當正中一重不須開門大瓦罐八枚瓮子四枚各滿盛水插柏及柳枝安水罐瓮中作白餅粳米飯乳酪酥蜜香果子等供養然十六燈四門外合插十六隻未經用箭掛五綵線於箭上取佉陀囉木紫薑木是四枚二長五指二長六指釘壇四角散種種時非時華於壇上又取頗伽木拘杞子小者是一千八百枚各長一尺若一瓦鉢若銅鉢和酥乳塗此木枝呪一枝一遍即擲火中無佉陀囉木時赤棗木代亦得須畫一白色觀音聖者像隨力大小作又先翻法云千劫聚集業障一時誦念悉皆滅盡得千佛聚集善根得背千劫流轉生老病死邊際捨此身已即見千轉輪聖王恒持十善若欲生諸佛淨土者晝夜各三時誦二十一遍滿三七日如其所欲即於夢中或見佛金色形像及菩薩形像此是先相即知當生淨土又受持法取突婆香唐云茅香并苗五斤楮木一千箇長一尺并酥總呪一千遍臨欲燒之以酥塗木莖及香上各呪一遍燒之預五月六月取牛糞陰乾突婆香水和作泥作場身二肘圓作場場上安種種華香冬月無華刻華安之然熏陸香呪師面向東坐誦滿一千遍法成未呪之時用此呪水二十一遍或七遍服之呪水解污淨室道場佛堂洒身呪柳枝打病呪水治病並得各二十一遍若能一生日別三時時別誦二十一遍滅罪不可思議通一切用作是法者觀世音歡喜觀世音母身法印第三兩大指堅各捻二小指頭兩手並竪相著二頭指相捻在二大指小指上二無名指亦爾二中指在上頭少不相到掌下相著頭指來去呪曰唵一稅閉二合提二槃陀囉二合婆悉尼三折吒麼俱吒四陀羅尼五莎訶六是法印呪若有人能日日作之相續供養以胡麻酥蜜和稻穀華誦呪一遍一燒火中如是乃至一千八遍一百八遍呪燒亦得如是日日作是法者一切觀世音歡喜又法孩兒啼哭當以此呪呪結呪索繫項即止觀世音母心印呪第四合腕二食指二中指二無名指並屈頭相拄與大節令平二大指並竪相著捻食指頭側二小指竪頭相著大指來去呪曰唵一摩訶室唎二合曳二莎訶三是前二法印呪名觀世音母法若有人誦持能除身中百億劫重罪一切菩薩聞此呪者皆得奢摩他由此因緣得成佛位故名菩薩母呪有能受持者不久當蒙諸佛授記一切觀世音菩薩由此呪印得奢摩他記持一切觀世音菩薩三昧印呪第五兩腕合二大指二小指直竪頭合餘指不相著直竪但開二大指小指頭不相到是名十一面印是大三昧印頭指來去呪用十一面大呪作是法者能除一切王賊水火刀毒等難皆無怖畏是觀世音威神力故欲請諸菩薩等法先須作三昧印即得一切菩薩歡喜觀世音菩薩隨心印呪第六二手中指無名小三指向外相叉合掌右壓左指頭總博掌背並竪二食指相著大指亦然各博食指大指來去歸命與前十一面等歸命法同呪曰跢姪他一唵二多去唎多去音唎三咄多去音唎四咄唎五莎訶六是法印呪若人欲得聰明取一黃牛置清淨所令一童男子持八戒齋搆取牛乳經於三日所搆得乳日日還與其牛飲之從第四日至第七日搆得乳者即用作酪以酪作酥日月蝕時香湯洒浴著新淨衣而作四肘五彩水壇其壇無門其壇東面置蓮華座座上安置雞都摩致南面置都邏羅華座北面置俱嚕屈羅華座中央置隨心觀世音華座十六盞燈八盤飲食燒香散華而供養已取前件酥盛一新淨赤銅器中呪師此日不食三度洒浴念佛不得餘想將其酥椀置壇中心令其作酥小兒在外看於日月勿令小兒見壇內事呪師不得見於日月若見日月一不得驗若日月漸生來至心作多唎心印把其酥椀數數呪酥其酥椀中三種相現謂𣊵煙火若但𣊵服酥之人一日誦得七百偈經若出煙者服酥之人一日誦得七百偈經若出火者服酥之人及與他服即大聰明一日誦得一千偈經若其如常亦能強記其酥一兩二兩三四五兩任意皆得又有隨心觀世音印第七不見別號亦無別呪二手十指皆竪頭合掌內少空兩腕相著正當心上此印共供養一切印法同隨心觀世音祈一切願印第八左手大指屈而向掌又屈頭指頭離大指頭四五分許中指以下三指總申相博以印橫側著心上指頭向右呪用前呪是一法印欲求願時先作縱廣四肘水壇懸諸幡蓋種種莊嚴於其壇中著隨心像當其像前列著四椀其四椀中各盛一味謂盛石蜜沙糖乳蜜如其次第各盛供養散種種華燒沈水香供養像已對像至心發露懺悔隨其所願仰祈請竟像前作印以袈裟覆或用淨巾覆其印已至心誦呪滿八百遍更莫餘緣誦此呪竟隨心所願悉得稱意隨事大小一日乃至七日作法日日三時晨朝日中及黃昏時依前作法必果所願除不至心十二臂觀世音菩薩身印呪第九左右無名指各列在中指背上竪二中指頭相著合竪二小指二大指並著屈二食指頭相拄各壓大指頭其食指齊第二節令平食指來去呪曰唵一摩訶稅去音羝二莎訶三是法印呪取牛糞牛尿酥乳酪等各一大兩總共和攪香湯洒浴著新淨衣正面向東並足蹲坐即呪前藥一百八遍六月一服一年再服自身無病治病大吉觀世音菩薩不空羂索身印呪第十准前觀世音母身印上唯改開二中指去一寸許二頭指無名指少舉勿與大指相著頭指無名指間開容一中指地頭指來去呪曰跢姪他一唵二濕閉二合多夜三濕閉二合多菩闍去音夜四去音醯醯五鉢囉麼六輸馱薩埵七摩訶迦嚧膩迦八莎訶九是法印呪通種種用皆有大力亦能降伏一切惡鬼神療一切病一切賊難皆不能害若被枷鎖取施輸末羅指作印呪已塗枷鎖上更至心呪即得解脫觀世音菩薩不空羂索口法印第十一以左右小指內隻直竪右無名指㧙左無名指中指背向頭指中指岐間入左無名指從右中指無名指間出之即入食指中指岐間入二中指直竪頭相拄屈二食指各鉤無名指頭並二大指直竪頭相拄與小指離半寸許同誦前呪觀世音菩薩不空羂索牙法印第十二准前口印唯改少屈二中指頭各壓二大指頭二小指出外右壓左總握無名指背呪用前呪是一法印能除一切水火風賊刀及王難夜叉羅剎一切鬼神毒龍毒蛇繫縛等難若人日日常作供養得觀世音及諸菩薩等皆生歡喜命終得生阿彌陀佛國又復十方淨土隨意往生若欲止風先以此呪呪灰一百八遍小片絹裹將隨身去若風來者以右手取灰向風打散次以右餘指作拳頭指直竪向風數數誦呪瞋喝即斷觀世音菩薩不空羂索心中心呪第十三呪曰唵一唎悉底哩二合盧迦去耶反毘社夜二阿謨伽波舍三摩訶鳩嚧馱四囉闍夜五唎陀去音夜六阿波囉上音提阿跢七嗚𤙖嗚𤙖八㧊㧊九是一法呪能滅罪障懺悔治病大有神驗具如不空羂索經說畫觀世音菩薩像法一切觀世音菩薩像通身白色結加趺坐百寶莊嚴蓮華座上頭戴七寶莊嚴華冠而有重光其華冠中有立化佛其華冠後作簸箕光其光之內總作赤色其像背倚七寶繡机其像左手屈臂當心又屈中指向上直竪右手屈臂向左手上屈頭指與大指相捻而拄左手中指之上其像頸有寶珠瓔珞左右臂腕各有寶釧又以寶花莊白褻絡膊身著花莊白褻之裙其裙腰作青色赤裹又以寶繫其腰上其像左右廂各有一菩薩以為侍者其二菩薩通身黃色俱頭戴華冠右廂菩薩右手屈臂而把白拂左手屈臂而把蓮華左廂菩薩右手屈臂把雜寶華一枝左臂屈竪手把白拂悉著朝霞縵𦜮之上華莊白褻絞於髀上而各立於蓮華座上其像侍者後左右廂各有三菩薩以次上下側身各面向像瞻仰而坐助觀世音神通自在救護眾生其像左廂上一菩薩通身黃色頭上有少黃色以寶莊華緣於髻上青色圓光耳有白環而申右手當右膝上皆展五指垂掌向下左手當心而把蓮華以白華褻絡其膊上兩臂腕上而著寶釧又以朝霞縵𦜮而坐青蓮華上次下菩薩通身黃色頭戴華鬘作赤圓光耳有白環乳房高大以輕白華褻橫縵乳上右手背在髀上屈著竪手向上五指俱散左手覆在左髀膝間臂腕有釧著朝霞裙坐紅蓮華上次下菩薩通身白色面上眉間而有天眼其頭髮髻如似赤色頭無華鬘作青圓光耳上無環而有四臂右邊一臂屈肘向後腋間出舉向頭以其手指拄著髮鬢一手屈臂拄右膝上把黃色數珠珠有三七左一臂屈肘向後腋間出手向上至於肩上手指如拳一臂拄著髀膝間覆手把經匣以淺綠紗絡其膊上以朝霞裙交其脚脛而坐紫色蓮華座上右廂三菩薩次上一菩薩通身白色頭戴華鬘作青圓光耳有白環乳房高大以白華褻橫縵乳上左手屈臂在左髀上而把蓮華右手按髀上仰把一物狀似果子亦如似華盛在掌中班斑然作臂腕有釧著朝霞裙帖膝坐於紫蓮華上次下菩薩通身黃色頭戴赤色華鬘作赤圓光耳有白環左手屈臂在左髀上把於蓮華右手在右髀上仰掌散指如峻顯之臂腕有釧以素白褻絡其膊上著朝霞裙交脚而坐紅蓮華上次下菩薩通身黃色頭有花鬘仰面向上看視其像耳有白環作青圓光而有四臂乳房高大以白寶褺橫縵乳上二手合掌又一左手屈臂在左髀上而把蓮花其華紫色其華莖狀如箭幹形而作黃色華頭向上右一臂屈向後腋間出手向上至於肩前而把數珠珠有三七而著赤色菊華褺裙交脚而坐青蓮華上其菩薩等並是觀世音菩薩眷屬於其像上近光左右各有二軀須陀會天右廂天者作乾闥婆音樂供養左廂天者以散華香供養菩薩又華光兩邊各有四鳥而助供養左邊有二頻伽鳥並行而立次後有二鸚鵡並行右邊有二孔雀並行次後有二白鶴並行其像座下左廂又有二菩薩通身赤色作年少形顏容端正軀貌肥壯頭髮短促如作赤色面上眉間有一天眼有一白蛇從背後出而向左轉高舉頭却向此菩薩面看右手屈展左手近乳而把蓮華而著竪襴青白色褻短小裙子縵腰𦜮上立而不坐右廂菩薩通身黃色著朝霞裙合掌峻坐紫蓮華上仰面看像而作供養布以綠地其像兩邊有菩提樹於其樹上有凌霄華絞絡座下著青綠黃赤紫等色為廁寶地畫像法竟觀世音毘俱知菩薩三昧法印呪品印有二十一呪有四十四如是我聞一時佛在王舍城中說諸法印陀羅尼呪時與無量菩薩大眾及無數持呪賢聖眾俱前後圍繞來詣佛所到佛所已五體投地頂禮佛足禮佛足已繞佛三匝却坐一面爾時觀世音菩薩摩訶薩白佛言世尊我有心呪名毘俱知甚深微妙祕密神通具諸法印及壇場法護持世間普令眾生人非人等免離諸苦一切眾生獲其利益我今欲說惟願世尊聽許我說時佛讚言善哉善哉善男子汝為一切諸眾生故欲說法印陀羅尼壇我助汝喜隨汝意說爾時同會諸菩薩眾莫不歡喜一時稱善爾時觀世音菩薩承佛神力即說印呪毘俱知大身法印呪第一先反列二手小指各在無名指背上次各列無名指在中指背上二腕相著竪二中指頭相拄竪二大指二食指然其食指少屈似不屈勢頭指來去若以二食指總屈來即是華座印呪曰那上音謨薩婆怛他伽底驃一阿囉訶陀上音驃比冶反二三藐三菩提驃比冶反三唵四跛冶那去音薩儞五怛囉二合上薩儞六怛囉二合上西七怛囉二合上薩耶八毘𠼝二合俱上音知九跢知十倍移跢知十一倍移跢知十二倍囉上音提十三倍囉上音提十四濕閉二合羝十五遮智尼十六莎去音訶十七是法印呪若欲誦時可作身印至心誦之諸佛聞者皆悉稱讚若諸菩薩聞呪音者皆生歡喜諸天聞者皆悉頂禮一切金剛聞呪音者皆悉怖畏若諸鬼神聞呪音者皆生恐懼六道一切眾生聞者一切皆發菩提之心在地獄中受苦聞者皆得停息一切酸楚法應如是毘俱知大心呪第二用身印呪曰唵一毘梨二合俱上音知二俱上音知訶入音三毘俱上音知中大心呪第三用身印呪曰唵一毘𠼝二合俱上音知二沒馱上音儞三索四毘俱知小心呪第四用身印呪曰唵一毘唎二合二毘俱知中小心呪第五用身印呪曰唵一毘唎二合俱上音知二莎訶三請毘俱知來呪第六用身印呪曰唵一毘唎二合俱上音知二莎訶三毘俱知一切用呪第七用身印亦名大心呪呪曰唵一般摩跋時唎二合儞二嗚𤙖三泮四毘俱知頂呪第八用身印亦名頭呪呪曰唵一智儞二莎訶三若有人持前大呪等八種呪時欲作法者皆應同用前法身印種種有驗毘俱知香鑪法印呪第九印是第二呪是第九准前身印上唯改二大指愽著二食指二中指屈上節頭相拄呪曰唵一賜俱上音嚧俱上音嚧二毘闍去音曳三莎訶四是法印呪當欲作法誦毘俱知菩薩呪時當以此印印其香鑪及印香已然後燒香手執香鑪心口發願今為某事云云供養畢已次印香水毘俱知香水法印呪第十印是第三呪是第十梵音云乾陀達羅度波以右手五指相愽展之屈肘側手印香水上左手無用呪曰唵一菩底都爾反下同二菩陀鉢底三輸達上音儞四莎訶五是法印呪當欲作法誦呪之時作印印水誦呪七遍以水散灑頭身之上亦用此法呪供養諸佛菩薩等已次作護身印呪法事毘俱知護身法印呪第十一印是第四呪是十一斜側覆二手以二大指並竪仍頭狀似鳥翅呪曰唵一鼻上音比儞二訶入上音呼是法印呪當欲作法誦呪之時即以此印護自身已次作結界毘俱知結地界法印呪第十二印是第五呪是十二左右中指以下反叉掌中右壓左指背愽掌以二大指斜並相拄直竪屈二食指相愽甲相背以二大指拄地呪曰唵一倍移跢知二嗚𤙖三是法印呪當欲作法誦呪之時以此印印地辟除一切地上地下所有諸惡魔神鬼等次作四方結界印呪毘俱知結四方界法印呪第十三印是第六呪第十三梵音波羅迦羅先側左手五指相著以右手壓左臂上手背相著以右大指鉤左大指隨日右轉呪曰唵一婆移跢知二嗚𤙖三是呪同地界呪是法印呪當欲作法誦呪之時即以此印右旋三轉向四方繞辟除四方所有一切魔鬼神等次作結上方界印呪毘俱知結上方界法印呪第十四印是第七呪第十四左右二手中指以下三指反叉右壓左指背愽掌以二大指頭斜相拄屈二食指甲相愽拄以大指頭倒臨頂上勿令著頂呪曰唵一跢知二嗚𤙖三是法印呪能除天上虛空所有一切諸魔惡鬼神等當欲作法誦呪之時但護身結界更無所畏種種欲作毘俱知法無有妨難皆有神驗毘俱知師子座法印印是第八用大心呪梵本云思蠅伽散那以左右頭指中指無名指頭相拄合腕以二小指直竪相去半寸許以二大指屈入掌內若來向外直竪二大指名來毘俱知歡喜法印印是第九用大心呪二手各屈小指以二大指各壓甲上餘指各散舒右手者直舒臂左手者覆胸上著起立屈右膝身就右邊左脚斜直竪若二脚相去四尺許即是使者印若喚來用右食指屈即來展即去是一法印打一切鬼及阿脩羅所在用者皆得大驗若惡人作一切惡法欲來相害者作此印呪悉皆不成毘俱知供養法印印是第十用大心呪梵本云阿伽母陀羅准前身印唯改二大指開頭相去二寸半許若並屈二大指入掌即是來法出二大指即是去法是一法印若以種種華香飲食供養三寶并作此印而供養者得福無量一切菩薩皆大歡喜毘俱知隨心法印印第十一用大心呪屈二無名指在掌右壓左二小指二中指各竪相著屈二食指各附中指第一節下以二大指屈愽食指下節側是一法印欲供養時當作此印誦大心呪毘俱知身現行者前令行者見所願皆隨稱心所欲毘俱知施與一切食法印印第十二用大心呪梵音云皤唎以二手仰舒八指小指至腕側相愽各屈二大指頭於掌中心著是一法印印中盛著諸飲食已將布施與護法神等一切眾生一切得者皆生歡喜以前五印皆共同誦前大心呪種種有驗毘俱知華供養法印呪印第十三呪第十五合掌仍虛掌中屈二食指於掌內現二大指並竪勿愽著食指呪曰唵一失哩二合智羅上音閦初數反彌二蘇婆羅上音帝三鉢囉上二合底都爾反紇哩二合瑟拏二合四摩逾波指登布史五莎訶六是法印呪若作觀世音毘俱知菩薩法事皆須應作此印供養得蒙一切菩薩歡喜毘俱知香供養呪呪第十六印用華供養印呪曰唵一鉢羅二合上底都爾反紇哩二合瑟拏二合二杜麼囉俱上音梨三莎訶四毘俱知滅罪呪呪第十七印用花供養印唵一阿地邑以入反二合地二毘訶囉儞三波囉二合提四莎訶五是二呪法若作毘俱知法皆同作前華供養印誦此二呪一切諸佛聞此呪者皆生歡喜悉得除滅無量劫罪毘俱知萬里結界供養呪呪第十八用法身印呪曰唵一紇哩二合瑟拏二合絲二嗚𤙖三㧊四是一呪者若欲作諸道場結法壇所廣為供養懼諸魔事應可用結前法身印誦是呪時即得法成毘俱知作壇泥地供養呪呪第十九用香水印呪曰唵一帝誓帝闍婆上音底都爾反二是一呪者若欲立壇廣設供養用前香水印印香水已當以此呪呪其香水一百八遍用塗壇地即得法成毘俱知菩薩降魔印呪法品毘俱知法甲呪呪第二十呪曰唵一跛治那去音舍儞二嗚𤙖三㧊四毘俱知法弩呪呪二十一呪曰唵一跢囉二合上薩西二嗚𤙖三毘俱知法左射呪呪二十二呪曰唵一跢囉二合上薩耶二嗚𤙖三毘俱知法右射呪呪二十三呪曰唵一跢囉二合上薩儞二嗚𤙖三毘俱知法箭呪呪二十四呪曰唵一毘𠼝二合俱上音知二嗚𤙖三毘俱知解一切外道及諸法事等結界呪呪二十五呪曰唵一濕閉二合羝二闍智儞三莎訶四是甲等呪若作毘俱知道場及設諸壇結界防護供養之所及以療病防諸神鬼破諸外道婆羅門難法一一皆須作前身印誦此六呪及誦諸呪悉得有驗毘俱知斫迦羅法印印第十四准佛輪印上唯改二食指去中指半寸許毘俱知跋折囉法印印第十五亦名瞋印二手合以二大指各捻掌內無名指下節並屈二無名指壓大指上餘三指各頭合二手三指中節相去一寸許毘俱知打一切鬼法印印第十六准前屈左手食指無名指小指以大指壓三指甲上勿令現甲直竪中指起立並兩脚將印置額上以中指向下垂當眉間面作瞋形右手無用應用此印打一切鬼毘俱知三眼法印印第十七准佛頂印上惟改二手中指已下三指反相叉掌中直竪二食指頭相拄其二大指勿愽中指各附食指側竪起立並二脚反列手正當額上指頭正當眉間下垂面作瞋形同軍茶利三眼法印是一法印若欲療病及將降伏一切惡魔大鬼神等當用此印誦前大呪法皆有驗毘俱知掐數珠法印呪印第十八呪二十六與十一面觀世音部掐數珠法同更無別異用大心呪又用滅障礙呪曰唵一毘唎二合舍稜輕呼伽上音儞二索三是法印呪名滅障礙毘俱知菩薩云作印掐珠誦此呪時除去過去未來現在三業罪障皆悉銷滅永盡無餘皆誦此呪無不有驗毘俱知捻灰法印呪印第十九呪二十七以右手大指及無名指捻取灰呪七遍頂上著呪曰唵一烏特二合伽上音底都爾反二息普二合嚕三莎訶四是法印呪若人誦持毘俱知呪法若有出行來去之處欲自防護及與他人防護其身以此法印捻灰呪七遍從頂至眉間兩腋咽下心等六處以灰塗之處處去者皆無障礙毘俱知發遣一切去法印呪印第二十呪二十八以左手屈中指無名指頭至第二節令平以大指相愽三指似綜小指及食指各直舒勿愽無名指中指屈膝並坐以右手拓地用左手印綜三指當胸前著腰屈向前呪曰唵一毘𠼝二合俱上音知二俱上音知三嗚𤙖四儞儞五脚六是法印呪若欲發遣一切及欲驅使當作此印手拓地已舉頭口云去去即當速去毘俱知菩薩使者法印品毘俱知有二使者一名鉢囉塔摩二名鉢囉薩那是二使者各說一呪請用菩薩前身印降伏一切使者鉢囉塔摩呪合前二十九使者呪第一即說呪曰唵一毘𠼝二合俱上音底兮二合二婆羅提三伽羅婆四莎訶五使者鉢囉薩那呪合前呪三十使者呪第二即說呪曰唵一婆伽婆底兮二合二毘𠼝二合俱上音底兮二合下同三鉢囉二合那儞兮四鉢囉二合婆皤底五莎訶六是二呪誦菩薩聞者心生歡喜其二使者隨請菩薩菩薩印可是人得說此神呪者能令一切皆生信仰更有餘呪亦請通用及諸印等助成菩薩威神力故爾時佛亦同時悉皆印可其使者等皆大歡喜行菩薩法人當誦持是呪法者能令呪師所為之法皆蒙菩薩常所護念即說呪曰呪第三十一使者呪第三唵一跢知二嗚𤙖三脚四使者上方結界法呪合前三十二使者第四呪曰唵一婆移跢知二嗚𤙖三㧊四又結界呪呪合前三十三使者呪第五呪曰唵一濕閉二合羝二闍知儞三㧊四是二呪者結護之時並用菩薩結界護身印誦呪法成使者頭法呪呪合前三十四使者呪第六呪曰唵一皤冶那去音舍儞二莎訶三使者頂法呪呪合前三十五使者呪第七呪曰唵一跢囉二合上薩儞二嗚𤙖二合三使者眼法呪呪合前三十六使者呪第八呪曰唵一跢囉二合上薩耶二㧊三使者口法呪呪合前三十七使者呪第九呪曰唵一跢囉二合上西二嗚𤙖二合三㧊四使者心法呪呪合前三十八使者呪第十呪曰唵一毘𠼝二合俱上音知二㧊三使者弓法呪呪合前三十九使者呪第十一呪曰唵一婆移跢知二嗚𤙖二合三㧊四使者箭法呪呪合前第四十使者呪第十二呪曰唵一囉上知二㧊三使者棓法呪呪合前四十一使者呪第十三呪曰唵一婆移跢知二㧊三是諸呪等皆悉通用毘俱知菩薩法印制伏鬼神療諸疾病救護眾生皆當有驗小心呪呪合前四十二呪曰唵一岐入二毘俱知菩薩阿唎茶法印呪印第二十一亦名一字印呪以二手四指各握大指作拳先右手在左腋下次以左手在右腋下屈左膝身就左邊右脚斜直竪一准軍荼利身法印呪曰唵一苾凌二合去音長呼結是印已誦前大呪滿七遍已即攝後脚脚跟正當在右膝下脚莫著地右旋一匝口稱唬𤙖唱一聲已誦一字呪四顧看望起大瞋形成是毘俱知一法印名為大大母達囉毘俱知當作此法欲打一切爾時會中諸金剛部眷屬眾等而生大畏諸天魔等悉皆摧碎一時悶絕以菩薩印威神力故誦一字呪一遍即當誦觀音身呪等無差別一字佛頂功德無異毘俱知救病法壇品呪師若欲救病人者至於病家香湯洒浴著新淨衣與作法壇救其病苦其作壇處宜就好地居近水樹華林之間若臨恒河崕岸之處或近有龍深潭之所隨其所住最勝之處淨修其地如十一面七日壇法淨修地竟香泥塗地懸於種種雜色幡蓋及諸寶器其道場中應作四肘五色法壇壇中心著毘俱知菩薩位東方作蓮華座座上橫著一口大刀北方亦作一蓮華座座上仰安明鏡一面南方復作一蓮華座於其座上竪三隻箭壇西門外敷呪師座取五水罐各受一升以下者好滿盛淨水著五穀子以青柏葉及竹葉枝梨柰葉枝塞其罐口莊嚴罐已將安四角及壇中心種種上味果食十盤然十二燈以諸香華種種作法誦呪供養日日不絕滿七日已當候隨心法印至驗為限至誠懺悔得滅除障速成證驗後若療病亦依此法令其病人在呪師東面向北坐呪白芥子遶其病人頭上燒之三日定差若作是法壇如能候得日月蝕時為此壇者最為大驗若不值遇日月蝕時於其月內擇取吉日若無如前好處所者當就好寺作壇亦得而其呪師必須得他布施白馬若無白馬用銀作馬而與呪師若無銀作馬任呪師意所須之物以代馬用若無物者好心孝順持戒堅固能得不違阿闍梨教嚴決之者方教此法毘俱知菩薩呪功能若有沙門若婆羅門若善男子善女人等持是大呪印為護身結界種種作法療病懺悔供養香華不絕者當得菩薩護念若欲入阿修羅宮者於八年中日日誦呪滿三千遍作三眼印用前大呪呪白芥子一百八遍一呪一散以打地上其地即開而作孔穴呪師得入欲住得見彌勒佛者即任意住若欲出來勿入城中若見道中有財物者將擎出來亦得無罪若有果子取而食之壽命一千歲若意得大海竭者可至海際經三箇月用前大呪呪白芥子一百八遍散海水中日日如是海水即竭若意欲得捉龍取者應當近於有龍水邊經一百日作法誦呪其龍自出來就呪師任為調伏若治熱病最為驗吉若人欲得安怛囉二合陀那取摩那叱囉唐云石雄黃也蜜陀僧二物等分共擣為末更細研之經六箇月日日洒浴著新淨衣日日三時平旦日中及日暮時至心呪藥一百八遍訖更呪七遍點著眼中即得隨意安怛囉二合陀那洒去方見其藥勿使餘人把之若意欲入阿修羅宮有諸惡物羅剎蛇等而作障難及門不開黑闇等障皆預作意呪白芥子一千八遍自隨將行但有障處即用打之在在處處皆無障礙畫毘俱知像法若用白褺若於絹上畫作其像畫師先受持八戒齋畫釋迦佛像左廂畫金剛右廂畫觀世音菩薩其佛金色金剛身面勿黑勿白形狀如年十六童子一切身分猶如莊嚴菩薩身法其觀世音面及身分頭冠瓔珞天衣莊嚴錦綺羅裙皆如餘處畫觀世音菩薩之法觀音左手下更別畫天女形身皆白色衣服赤白貌極端正頭戴華冠次畫持呪師在下胡跪手執香鑪向觀世音作此像已從白月一日至十五日當食大麥乳糜恒誦後呪至黑月八日三日三夜勿食供養像時其天女像即放光入佛脚指中見此相時悉果心願又若欲見槃茶囉婆私尼於十三日若十四日或十五日三日三夜可入大海水中誦呪張其畫像於水岸上以百千蓮華供養之時其槃茶囉婆私尼天神若來修道聰明智慧辯才持呪仙人隨其所願皆得如意又毘俱知呪呪曰那上音麼薩皤跢他揭羝驃鼻朝反一婆伽上音皤帝弊鼻可反二唵三薩皤婆上音夜那舍儞四怛囉娑上音儞怛囉娑上音儞五怛囉娑上音夜怛囉娑夜六怛囉西七苾炬智八儞矩智九哆智哆智十吠跢智吠跢智十一戶嚕嚕吠跢智十二稅去音羝闍上音智儞十三莎訶十四句是呪亦名觀世音菩薩說金剛呪誦此呪時一切障難皆悉休息若欲自護呪灰七遍點額項下并二膊上去處無畏若為他人呪其頭髮結作為結心恒念呪一切官府若夜獨行若賊中行一切畏處皆得無難所有惡人皆歡喜歸伏不能為礙欲降伏一切當於白月十五日一日一夜勿食以菩提樹為柴然火一撮胡麻呪一遍已擲火中燒如是數滿八千遍時一切歸伏尸利沙樹合歡樹是拘留孫佛得道樹是但是佛得道樹即得用也苦練亦得若被一切怨人厭禱遂失心性取男骨作橛呪滿八千遍丁埋怨人門底還令彼人失心性也又法取燒尸灰於黑月八日呪一撮灰一遍擲火中燒如是滿八千遍怨人即滅又法於黑月十四日入水中立至臍誦呪一切怨家惡賊群眾兩作和解俱生善心又法欲作四方結界取佉陀囉木長橫八指四枚各呪八百遍已釘著四方一切惡鬼及惡怨人皆不得入此界之內又於界中作曼茶羅呪水二十一遍灑散地上即成結界於中即堪作呪法也又法薩埵姥跢跛吒上音那𤙖蒲利沙蜱七遍呪芥子又法云長命闕物難成不譯也又法取秦牛酥一點子許一呪一燒如是數滿八千遍已若到一切病痛障礙並悉銷除亦不須看日月時節得作即作柴亦任用又法取木患子柴然火燒藥此土無故闕之又法瞋賊來欲躓頓我誦此呪已即心歡喜又法官事月八日於觀音像邊呪白花一莖一遍擲火中燒滿八千遍官事解了又法有賊欲來侵亂於觀音像前至心誦呪賊即還去又法隨求何法誦此呪時燒無煙炭呪白芥子一顆一遍一擲火中燒滿八千遍所求皆遂又呪白芥子七遍一切起屍鬼等皆悉被縛又法呪石蜜七遍擲著水中即取此水作曼茶羅結界於中誦呪一切師子大蟲禽獸水牛白象囉闍朱囉水等皆不能害毘俱知印呪及功能法略說已竟
