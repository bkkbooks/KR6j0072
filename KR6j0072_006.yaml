body:
  text: 大唐天竺三藏阿地瞿多譯何耶揭唎婆觀世音菩薩法印呪品唐翻馬頭當部印即有八呪有十六馬頭護身結界法印呪第一兩手從中指以下三指向外相叉各博著手背合掌二食指直竪相去五分許並二大指相著各屈一節勿著食指頭指來去呪曰唵一鉢囉毗迦悉跢二跋折囉三涉筏二合囉囉上音支四莎去音訶五是法印呪若欲受持是菩薩法者先須以此法印誦呪護自身已又呪木七遍或呪水七遍復以印印水或呪白芥子若呪灰等皆各印呪滿七遍已將木竪於四角為界芥子灰水散於十方皆成結界然後作諸法事悉當有驗馬頭大法身印呪第二兩手食指以下三指向外相叉指頭各博著手背合掌以二小指並竪相合並二大指相著屈努大指來去呪曰唵一杜那杜那二摩他摩他三可馱可馱四訶耶揭唎婆五嗚𤙖㧊六莎去音訶七是法印呪若人被毒蟲及蛇齧者并得惡人以印印已呪之即差又法欲得咩古來者取蘇摩那華對馬頭像前呪二十一遍一散像腳竟右手取華所行之處隨愛咩古從後呪華七遍方散即來又若彼此俱有心者取果子呪二十一遍使人送食時心即迷亂極相愛念更無他意馬頭法心印呪第三以二手食指以下四指向外相叉指頭各博著手背合掌並二大指相著各屈一節勿著食指大指來去呪曰唵一阿蜜唎都知二合婆去音婆平音二嗚𤙖㧊三莎去音訶四是法印呪若欲論議取牛黃麝香龍腦香三味和研呪千八遍點著頂上及二髆上心喉眉間髮際腦後又取白芥子呪三七遍以右手把至論議所門邊散之仍左手中留少許分正論議時以右手把左手芥子向論議人私密散已便即彈指即得勝他法當如是馬頭頭法印呪第四準前護身印唯改二食指頭相拄各屈出二大節小尖頭呪曰跢姪他一斫迦𭈖怖二斫迦囉去音叉𭈖怖三斫迦囉跛曇摩叉𭈖怖四阿謨迦去音寫五稱彼人名始囉上音枳徵上音二合六跛囉舍網伽車上音覩七莎去音訶八叉去沙反餘處皆然其法若一切人患頭痛者取其名字即誦此呪呪水作嗚𤙖去音聲已即以此水打其頭上印其痛處其痛即愈古本闕此呪也馬頭頂法印呪第五準前頭印唯改竪二食指頭相著列二中指在食指前頭相拄呪曰唵一室唎二合羅唎至二嗚𤙖㧊三莎去音訶四是法印呪若有人病頭頂痛者當以此印印其痛處誦呪即差馬頭口法印呪第六反叉後二指於掌中直竪二中指頭相拄並竪二大指以右頭指捻右大指頭左頭指竪少曲在中指邊呪曰唵一鶻嚕嚧二鳩嚧馱那三嗚𤙖㧊四莎去音訶五是法印呪用治一切鬼病即差馬頭牙法印呪第七準前觀世音不空羂索菩薩牙印上唯改二中指直竪頭相著二大指並竪博中指先以左小指握右無名指背後以右小指握左小指背呪曰南上音謨上音囉上音跢那二合怛囉二合夜耶一南謨阿梨耶二婆盧吉帝三攝婆二合囉去音耶四菩提薩埵去音耶五摩訶薩埵去音耶六摩訶迦嚧尼迦去音耶七跢姪他跢囉上二合吒九跢囉上二合吒十末吒末吒十一瞋陀瞋陀十二頻陀頻陀十三嗚𤙖十四㧊㧊十五莎去音訶十六是法印呪若破諸法欲令餘人所作呪法不成辦者當作四肘三色粉壇南北兩面畫蓮華座於其座上畫著牙形東面華座座上畫作拔折囉印然十二燈百味異食備辦八盤其食日別換著新者新新供養滿於七日日別仍須呪白芥子一百八遍一呪一投火中燒之一切諸人作法皆破不能成辦餘人者謂外道惡人馬頭觀世音菩薩乞食法印呪第八仰左手各竪五指右手下向以中指無名指大指頭各相拄呪曰唵一是那耳二句誦二七遍馬頭觀世音菩薩解禁刀法印呪第九舒二手左手在外右手在內以左手拓右手背竪二大指呪曰唵一阿娑忙義儞二莎訶三馬頭療病法印呪第十反叉二手後二指掌中竪二中指頭相拄並屈二大指當前各以二頭指屈握二大指甲根頭指甲背相著呪曰唵一鶻嚕嚧二鳩嚧馱去音那三嗚𤙖泮四莎去音訶五是法印呪當用療治一切諸病及鬼神等所苦惱者悉皆療之其病即差馬頭觀世音菩薩大呪第十一呪曰那上音謨上音下同囉上音跢那二合怛囉二合夜耶一那謨阿𠼝耶婆盧輕呼枳帝攝筏二合囉去音耶二菩提薩埵去音耶三摩訶薩埵上音耶四摩訶迦嚧尼迦去音耶五那麼薩婆薩埵毗耶二合娑上音那伽底都爾反爾六那麼薩婆薩埵毗耶二合婆上音那博訶唎泥七那麼薩婆薩埵婆瑜去音跢囉那去音耶八那謨薩婆薩埵婆耶跋囉二合賒麼那迦囉去音耶九那麼薩婆薩埵毗耶二合地只枳瑳上音那迦囉去音耶十那麼薩婆薩埵盤陀去音那熾熾詣反陀那迦囉去音耶十一那謨薩婆薩埵獨佉波囉木叉拏迦囉去音耶十二那謨薩婆毗知案去二合陀迦去音囉毗陀麼那迦去音囉去音耶十三那麼薩婆毗知耶二合遲揭去音陀謨鬱跢二合平曳十四摩訶迦嚧尼迦去音耶十五那謨薩婆毗知耶二合囉闍跋囉二合比跢曳十六摩訶瑜去音嗜攝筏二合囉去音耶十七跢寫那摩悉提二合唎埵十八伊上音擔阿唎耶婆盧輕呼枳帝攝筏二合囉姥枯知上二合吉去音南十九𠼝師毗知耶二合陀去音囉二十弟婆那去音伽藥叉囉剎娑二十一氈去音哆囉二合智知耶二合二十二揭囉上二合訶那叉跢囉二合二十三釋揭囉上二合跋訶上音摩二十四路迦婆去音羅毗瑟紐二合二十五摩醯攝筏二合囉那囉冶那二十六始婆悉健二合陀俱上音鞞去音囉二十七素唎跢囉二合那跢哩二合伽那地遮去二十八那摩悉揭二合哩擔二十九何耶揭哩飯那去音摩𠼝跢厭上音三十摩跋帶去音釤弭上音三十一薩婆羯麼遏他二合娑陀去音旦三十二阿娑上音醯上音閻二合三十三薩婆蒲陀去音難上三十四毗沙難去音闍三十五泥迦