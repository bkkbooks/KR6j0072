面極令端正作慈悲顏顏色赤白頭髮純青左邊一面作大瞋怒黑色之面狗牙上出頭髮使竪如火焰色右邊一面作大笑顏赤白端正似菩薩面頭髮純青三面頭上各戴天冠及著耳璫其天冠上有一化佛結加趺坐中面頂上作碧馬頭仍令合口菩薩項下著寶瓔珞項背圓光數重色作左手屈臂手當乳前把紅蓮華其蓮華與菩薩頭齊正臨左髆其華臺上作一化佛著緋袈裟結加趺坐項背有光右手仰掌五指皆伸臂肘平屈其手掌擎真陀摩尼唐云如意珠也其珠團圓如作白色赤色光焰圍繞其珠於其右手正當珠下雨種種寶其左髆上著弊耶二合迦囉者摩二合唐云虎皮如著祇支當右腋下掩皮結帶更用虎皮縵其胯上以外臂釧天衣裙等皆如餘處畫菩薩法如令菩薩端身正立紅蓮華上空懸寶傘蓋菩薩頭其上空中畫作種種天音樂具兩邊空中須陀會天舞蹈供養畫此像時用香汁畫皮膠不當用馬頭觀世音菩薩受法壇若有沙門若婆羅門諸善男子善女人等意欲受持菩薩法者準前應作四肘壇法當覓勝地清淨之所掃灑清淨復以香水牛糞泥地懸於種種雜色幡蓋寶鈴珮鏡并諸金銀種種間錯嚴飾道場其道場中立五色壇縱廣四肘先下白色次黃次赤次青次黑而作四門其壇中心作蓮華座安置馬頭觀世音像正當東門作蓮華座安十一面菩薩正當北門作蓮華座安八臂觀世音其壇南方更無華座作八龍王何等為八一名難陀龍王二名婆素雞龍王三名德叉迦龍王四名羯固吒龍王五名般摩龍王六名摩訶般摩龍王七名商佉波羅龍王八名鳩利迦龍王此八龍王唯以粳米乳糜供養以外餘者種種飲食供養亦得然四十五燈先喚八箇龍王安置用馬頭菩薩身印來去呪曰唵一闍去音耶毗闍去音耶二阿瑟吒二合那去音伽囉闍那三阿羅闍那四莎訶五其壇西門如近南畔安一火爐以胡麻人稻穀華等酥蜜相和竟誦菩薩心呪呪前和物一遍呪已投火中燒一一如是乃至滿足一千八遍已次請中心馬頭菩薩次請北方八臂觀世音菩薩用菩薩身印法來去呪曰唵一夜勢夜輸擔二莎訶三次請東方十一面菩薩用華座印來去安置座已散種種華燒諸名香沈水薰陸栴檀香等而供養之呪師一日不食如不忍飢唯得食酥香湯灑浴著新淨衣入道場中而作供養常得觀世音菩薩憶念亦於一切菩薩法中皆悉有驗若欲論議當作此壇而供養者皆得勝上不被他難亦能難他若病難差作此壇已病無不差若被毒藥毒蟲虎等之所傷者若誦前呪無有不差用酥木佉子唐云藝臺搗以為末極令微細用酪作酪殘汁也汁和如和法用馬頭觀世音心呪呪三七遍與其病人空腹服之腹內所有一切毒蟲悉皆吐出亦兼通用軍茶利法結界供養以下諸菩薩法諸大菩薩法會印呪品當部印有九呪有十大勢至菩薩法身印第一反叉後二指於掌中竪二中指頭相拄以二食指於中指背少屈各捻中指頭以二大指並掩在右中指中節上大指來去又大勢至菩薩法印呪第二以二小指㧙於二無名指背竪二無名指頭相拄又竪二中指頭相拄以二食指各㧙在中指背頭相拄以二大指並頭屈入中指下節邊大指來去呪曰唵一跋折囉二婆折唎尼三瞿吒瞿致尼四盤陀盤陀五訶那訶那六馱迦馱迦七鉢遮鉢遮八嗚𤙖㧊九莎訶十是法印呪等若有人能受持印呪每月十五日香湯灑浴著新淨衣作法誦呪者速證阿毗跋致若更建立道場日日香華供養其福勝彼文殊師利菩薩法印呪第三反鉤二無名指右壓左在於掌中合腕二小指二中指直竪頭相拄二頭指曲各捻中指背上節上頭指來去呪曰唵一婆雞陀那去音麼二莎訶三又本無莎訶此文殊師利印六字呪功能我今欲説若有持此呪欲成就者或食乳或食乳糜或食菜或食果子食乳應食此食日別三時香湯灑浴謂入五更以後為初時日中以後是第二時黃昏以後至初夜為第三時於此三時各一度灑浴時別各著一具淨衣是故亦須三具淨衣誦呪令滿六十萬遍此為最初承事供養文殊師利又若欲受持成就驗者先須畫作文殊師利菩薩之像其畫像法取好白褻勿令有毛髮亦不得割斷盧縷其彩色中不得用膠應以香汁和畫其文殊師利之像蓮華座上結加趺坐其右手畫作説法手左手正當胸上仰著畫其像身作童子形身黃金色白色天衣遮臍以下餘身皆露首戴天冠身佩瓔珞臂印釧等衆事莊嚴其左廂畫觀世音像其身白銀色瓔珞天衣莊嚴身分極令華飾蓮華座上結加趺坐左手執白拂其右廂畫普賢菩薩像其身金色瓔珞衣服莊嚴身分極令華飾蓮華座上結加趺坐右手執白拂正當文殊師利之上於虛空中兩邊各作首陀會天手執華鬘在空雲內唯現半身手垂華鬘於其文殊師利像下右邊畫作受持呪者右膝著地手執香爐其文殊師利等下遍畫作池水其菩薩像兩邊各畫作山峯形其畫師自從起首欲畫之時日日與受八關齋戒香湯灑浴著新淨衣然後畫作乃至畫了當覓有佛舍利塔處即安文殊師利像在塔東面像面向西若無大塔應以小塔安置文殊師利像後以面向西設種種香華種種飲食及果子等三時供養其道場內然於酥燈作其道場要須預覓寂靜之處呪師唯令一人供給若正在道場誦呪之時所須香華飲食等供彈指而索不得出言布置種種諸供具已取沈水香截長二指一千八段點都嚧瑟迦二合油唐云酥合香是燒於無煙佉陀羅炭若無以紫薑木替取前沈香點前油中呪一遍已投火中燒如是乃至盡千八段一夜將曉明相出時行者即見文殊師利所有求願皆悉滿足除淫欲事以外所求悉皆不違行者所願又法當於像前取栴檀香截長二指一千八段還依前法呪火中燒晝夜供養是時文殊師利即自現身當為説法所有身患皆悉除愈得菩薩地而得自在又法當於像前以瞿摩夷塗地散衆名華燒種種香行者於塗地場內一邊坐誦呪滿足一百八遍如是乃至經於一月得大聰明悉能記持一切經論又法日日隨心常誦莫忘定受業報亦令銷滅又法若日別能誦滿一百八遍臨命終時決定得見文殊師利隨心所願皆得受生文殊師利為欲利益諸衆生故諸功能中略説少分復次是法印呪若有人患惡瘡惡病取龍腦香沈香甘松香多伽羅香苦楝樹皮是五種物總搗為末以牛膽和而作團已竟然後陰乾欲用之時日中暴乾仍以淨布覆其藥上勿令見日當以前印印其藥上亦以前呪呪藥滿足一百八遍更作小丸如彈丸大於大盤中盛水和竟用塗瘡上二十一遍塗之即差若腹中有病取淘粳米水和煎藥服二十一度其病即差彌勒菩薩法印呪第四反叉後二指於掌中以二食指各在中指背令頭著中指甲下以二大指竪捻二中指上節文其二中指相離一寸半許開頭指來去又彌勒菩薩法身印呪第五準前釋迦金輪印唯改開二中指頭相去一寸半許頭指來去呪曰唵一妹夷帝𠼝二合二妹夷帝𠼝二合三妹怛囉二合摩那上音西四妹怛囉二合三皤鞞五妹怛嚕二合婆上音鞞六莎訶七是法印呪若有受持諸佛菩薩金剛天等印呪法者日日灑浴入道場中誦呪作印即得一切佛菩薩等皆悉歡喜地藏菩薩法身印呪第六仰兩手二頭指二無名指各相鉤右壓左二大指各屈在掌中以二中指各屈押二大指甲上二小指又各屈在掌中大指來去呪曰唵一波囉二合末平音馱儞二莎訶三又地藏菩薩印第七合兩腕二大指直竪屈二頭指壓二大指頭二中指直竪以二無名指各㧙於中指背上二小指開直竪是法印呪若有人每以白月十四日黑月十四日香湯灑浴立地端身並兩腳已而作此印誦呪護身滅罪療病大好有驗普賢菩薩法身印呪第八準前佛品帝殊囉施頂印上唯改開二中指頭指來去呪曰唵一跋提𡅏二合下同二跋提𡅏三蘇跋提𡅏四跋陀囉二合跋智五盞陀囉六毗摩去音禮七莎訶八是法印呪若有人能於白月八日十三日十五日香湯洗浴獨自房內不聽他入面向東胡跪當作此印至心誦呪二十一遍發露懺悔得滅衆罪若以此呪呪一切藥二十一遍用而服之身常無病若常誦是呪在在處處一切歡喜普賢菩薩為坐禪人却神鬼魔呪第九呪曰那謨囉上音怛那二合跢囉二合夜耶一那謨阿𠼝耶三曼陀跋達囉去二合耶二菩提薩埵去音耶三摩訶薩埵去音耶四摩訶迦嚧尼迦去音耶五跢姪他六跋提𡅏七摩訶跋提𡅏八阿底都儞反跋提𡅏九鼻上音伽上音多囉闍西十摩訶鼻上音伽上音多囉闍西十一莎訶十二受持法者燒熏陸香沈水香檀香等供養普賢菩薩於白月一日對佛像前誦一千遍若欲入定先誦七遍即入定心住亦不驚動見普賢菩薩呪第十呪曰那謨阿𠼝耶三曼陀跋達囉去二合夜一菩提薩埵去音耶二摩訶薩埵去音耶三跢姪他四頞囉上音茶徒皆反五羯囉上音茶六阿囉上音茶七羯囉上音茶八莎訶九此陀羅尼晝三夜三六時至心誦念不忘悉皆銷滅五逆重罪又法從白月八日起首潔淨專心誦呪至十五日日日三時誦呪唯宜得食三種白食粳米乳粥飯乳酪等其十五日一日一夜總不須食日日香湯清淨灑浴著新淨衣在間靜處而作壇場若十二肘或作九肘縱廣正等唯除酒肉五辛蔥蒜自餘種種上妙餅食及果子等備設供養竪幢竿子懸五色幡蓋又以種種時非時華遍散壇中燒沈水香薰陸栴檀香供養呪師面向東坐相續誦呪至夜半時聖者普賢菩薩若來現身爾時即得禪定三昧寂靜山居或得聞持不忘身體輕便亦能速行亦見伏藏所求修道方便疾得開悟普賢菩薩滅罪呪第十一呪曰支波啄決定一毗尼波啄斷結二烏蘇波啄生盡三此呪平旦七遍夜七遍誦此呪去厭魅野道蠱毒能得身心慧三解脫後生不受生死身得法身常身境內外國怨賊一切惡人一切惡鬼神一切盜賊虎狼師子毒蟲惡獸聞此呪聲皆口噤不相惱亂惡夢災殃鳥鳴百怪自然銷滅此呪功能説不可盡虛空藏菩薩法身印呪第十二仰二手反鉤二無名指二小指各屈掌內二中指相背著竪二頭指仰直舒右壓左二大指舒壓頭指上頭相拄大指來去呪曰唵一伽上音伽同上那健闍二婆盧吉帝三莎訶四是法印呪若有人能常樂誦持此印呪者所須財物悉皆如意若以此印印水呪已七日服之除一切病其水入腹喻如䬫糊晨朝向暮各服一升至於後日服一升半亦可二升三四五升每飲水訖禮十方虛空佛七拜行道七匝若有人服此呪水滿一百日者悉除身中一切諸病仍即證得阿羅漢道心心常念虛空藏菩薩不得廢忘是呪力故又虛空藏菩薩呪水呪第十三呪曰那謨囉上音怛那二合哆囉二合夜耶一那麼阿迦舍揭婆去音耶二菩提薩埵去音耶三摩訶薩埵去音耶四摩訶迦嚧尼迦去音耶五跢姪他六毗上音麼黎七摩訶毗上音麼黎八郁麼黎九摩訶郁麼黎十休麼黎十一摩訶休摩黎十二薩婆黎十三摩訶薩婆黎十四只唎剃十五莎訶十六當用此呪呪於淨水四十九遍與病人服若多人患呪一盆水人人各與二升服之或在身中或在身外或在生藏上或在熟藏下頭痛目眩身痛心痛寒熱不調聞是虛空藏菩薩呪水星菩薩呪八萬鬼神不得嬈害其身此大神呪能令病苦悉得除愈爾時觀世音菩薩摩訶薩等從是佛會各出本意而説法印呪品功德大威神力不可思議諸佛讚言善哉善哉汝等能為善護念故設此方便威神自在廣救衆生離諸貪著除其罪障去諸煩惱發大慈悲殷勤教誨感悟發覺我成印可爾時會衆皆悉歡喜作禮而去
