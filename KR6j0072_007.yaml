body:
  text: 大唐天竺三藏阿地瞿多譯佛說金剛藏大威神力三昧法印呪品第一印有五十七呪有三十二讚文有一十八印十一呪是主餘者伴如是我聞一時佛在毘富羅山與阿僧祇諸大菩薩摩訶薩眾并及無數諸阿羅漢天龍八部前後圍遶俱共會說陀羅尼印祕密法藏爾時會中有一菩薩摩訶薩名金剛藏在大眾中即從座起五體投地頂禮佛足禮佛足已前白佛言世尊我有眷屬十四部眾一一眷屬各有無量徒眾相隨現在會中為我驅使從昔已來曾持呪法深奧明了嚴祕清淨是故而共讚成我法稱我名為摩訶跋折羅波尼囉闍以是名故稱為上首我等亦願堅成助護佛之正法是諸眷屬在我左右行列威侍說諸方便多所利益為欲降伏一切諸魔惡鬼神故唯願世尊證明我眾聽許我稱眷屬名字方敢稱名爾時世尊告金剛藏善哉善哉汝今愍念諸眾生故稱其名字我亦印可汝今隨意稱其名字時金剛藏蒙佛聽許稱其名曰跋折囉蘇摩訶跋折囉蘇皤二合私地二合迦囉跋折囉蘇婆去音呼跋折囉迦尼矩嚧馱跋折囉阿蜜哩多軍茶利跋折囉烏蒭沙摩跋折囉吒訶娑是菩薩等皆居我左跋折囉摩麼雞跋折囉嚧醯多木企平音跋折囉商迦羅跋折囉鴦俱尸跋折囉母瑟低跋折囉施迦囉跋折囉尼藍婆羅達囉是菩薩等皆居我右是諸會中若天若人及諸魔王并鬼神等聞是我稱金剛名字各各無色皆悉默然心懷恐怖憂愁不快懼有大事恐失性命時金剛等遙知彼意慮在會中而生輕慢鬼神暴亂不遵敬法又恐謗毀墮於三途受諸苦惱而告彼言我有密意具諸法相佛已知之助成印可非是汝等所知境界是故稱云祕密法藏大陀囉尼神呪法印利益無量如佛所證時佛讚言善哉善哉爾時金剛菩薩眾等蒙佛讚成歡喜踊躍頂禮佛足繞佛三匝告彼一切魔鬼等言我等今以法成幸蒙十方一切諸佛同時印可利益一切汝等今者莫驚莫𭟘莫起惡念在此會中若天若人若有沙門若婆羅門若諸人王若天帝釋并及八部鬼神部眾人非人等若善男子善女人及諸外道仙人眾等悉皆諦聽我今上佛難思議深祕密法藏可貴教法汝等皆當信受共護是經即是同於諸佛大乘妙藏希有之法即是成就陀羅尼印神呪法門如來慈悲設諸方便救護一切眾生之類汝等若有故生違逆而不隨順我正法者破汝等頭而作七分如阿梨樹枝大眾人民聞佛所說應皆歡喜信受奉行畫金剛藏菩薩像法一切金剛藏菩薩像通身黃色而以左脚偏加斜垂右脚欲似下座而復起形在於百寶蓮華座上如令斜身面向右視而坐頭戴七寶莊嚴華冠身有重光其像背倚寶繡枕上其像左手屈臂覆左髀上右手屈臂在右膝上以手大指頭指相捻而屈中指及無名指在於掌中小指直竪其像頸下有寶珠瓔珞像兩臂腕各著寶釧以單素白褺絡其膊上兼二色縚附其褺上復以寶縚繫臍腰上其縚當肚結縚之上作一黃色圓如錢大以朝霞錦縵其胯上著黃白色華褺之裙其裙青裏脚踁映露寶縚為帶以繫其腰像左右廂各有一大侍者菩薩立蓮華上通身黃色以朝霞錦縵於腰跨連覆膝上總同頭戴七寶華冠其左廂侍者菩薩唯以左手屈臂近右乳房把於白拂拂頭正當臨左膊上右手申臂少曲在髀手指少捲臂腕有釧其右廂侍者菩薩華冠衣服與其左廂菩薩一種唯以左手屈臂近左乳房把跋折囉右手屈臂向上腰間仰手手把白拂散懸其拂拂頭垂下其像左廂近像髀側有一菩薩通身碧色於其頭上出三股跋折囉形其跋折囉下有緋縵縵其頭上次下復有黃縵纏頭覆臍鬢額唯出面眼其眼睛角如帶少赤似斜看視其像形狀如瞋怒相以兩手臂相交叉著以右押左附入腋間其脚偏交側坐竪左脚髀其髀間出一赤蛇絞肚及脚髀間出頭向左臂肘看映像身其像身坐赤蓮華上其像左右廂各有四菩薩上下皆坐而作威儀助金剛藏降伏一切次左上一菩薩通身黃色頭戴華冠耳有白環其像頂後有圓赤光以華白褺絞其右臂向後而出左腋間上絞絡其膊右手屈臂在右髀上以大母指頭指相捻中指無名指屈在掌中小指直竪左手屈臂橫在左脚髀𭧔間覆手把一物物作綠色其物向上頭少漸尖向下漸麁方而且圓如唐靴箄中心一道青色竪頭向其身上著朝霞裙偏加而坐赤蓮華上次下一菩薩通身黃色頭戴華冠作青圓光其像兩耳各有寶璫赤裹脣白穿在耳中以華白褺袜絞肚上右手屈臂以大母指頭指相捻餘三指散以手覆在右乳房上左手屈臂正當押在左髀膝間仰承把前菩薩手中所把似靴箄者著朝霞裙偏跏而坐青蓮華上次下有二菩薩前後竝坐後一菩薩通身黃色頭有少許作青圓光耳有白環頭戴鬘華其乳房大以華白褺橫袜嬭上右手屈臂以大母指頭指相捻三指握拳左手屈臂舒展手掌把前菩薩手中所把似靴箄者著華黃褺裙雙膝跪坐赤蓮華上次前一菩薩通身黃色迴面向左狀似共後菩薩語形頭有金線一道絞髻作赤圓光左一耳中穿一寶璫狀如瓦桶赤裹白脣作赤圓光右手屈臂近乳房側屈其中指及無名指在於掌中大指頭指小指散竪仰其手掌左手屈臂以手仰在於左膝上還承把前菩薩手中似靴箄者其箄向身頭傍偏有似作鉤形向外少曲臂腕有釧身著朝霞裙偏跏而坐紫蓮華上其像左廂上一菩薩通身黃色其頭髻上以少赤色絞之向後作赤圓光耳有一雙赤色寶物短小如櫡插在耳中其物兩頭各有白點以綠色褺絡其膊上著華白褺裙映出腰間少許朝霞左手屈臂在左膝上仰掌向身以大指食指兩指竪挾一跋折囉仰其手掌右手屈臂舒掌纔近左髀脚脛之間交脚而坐赤蓮華上次下菩薩通身紅色頭戴花冠作青圓光耳有白環形貌肥滿身著間綵色褺縵跨又從右腋下及膊上有一道間褺向後而出絞左臂肘間右手屈臂在右膝上手掌向身以大指頭指挾一隻箭羽向上竪左手屈臂近其肚上手把一塊黃色寶物兩脚相拄恭身而坐赤蓮華上次下有二菩薩前後並坐後一菩薩通身黃色頭上有金華冠作青圓光耳有白環以華白褺絡其膊上右手屈臂在右膝上舒掌向外以手把前菩薩手中所把似靴箄者右手屈臂向前竪之屈無名指竪其大指頭指小指其身上著黃華褺裙胡跪而坐赤蓮華上次前一菩薩通身黃色頭有少許黃菊華冠右一耳中有白寶環迴面向後狀似共後菩薩語形中乳房大以輕白褺絡其膊上右手屈臂引向外邊把一黃物其所把物狀似斷繩其物兩頭有小菊華相連成絛俱垂向下左手屈臂在於心上手掌向外以大母指頭指相捻中指無名兩指皆屈小指直竪著朝霞裙交脚而坐青蓮華上其像側相布以綠地像上側相兩邊畫著須陀會天在青雲間各以華鬘兩手垂把來趣像上而作供養其像兩邊有貝多樹及山形等其像華坐下著寶池次右廂著一小童子頭戴華冠通身黃色以雜綵褺間色縵跨峻跪而坐將以華鬘來助供養金剛囉闍一切見法印呪第一仰右手掌以捺左手掌背即以右大指逆叉左小指下以左大指叉右小指上手背相著餘三指皆直申博手背呪曰唵一跋折𡀔二波婆去音夜三莎訶四是法印呪若作金剛法先以此法而作供養一切金剛皆生歡喜金剛藏大心法印呪第二反鉤二無名指在掌中右押左合掌二中指二小指直竪頭相拄小曲開二頭指二大指直竪竝著呪曰那上音謨上音囉上音怛那二合跢囉二合夜耶一那謨室旃二合茶跋折囉波拏曳二摩訶藥叉斯那波多曳三唵四跋折囉戰茶五薩婆突瑟吒二合安馱迦上音六訶上音那馱訶鉢者思二合上音七唬嗚𤙖八泮泮泮泮九是法印呪名金剛藏大心法印呪一切皆用若人欲作金剛法者先作此印誦呪護身一切無畏若治一切鬼病時氣牛馬等患疫病之時於城門外作大水壇壇中心著一大水罇受四五升許滿盛淨水以此印呪一百八遍其壇四角安四盤食於壇四邊散種種花其壇左右各安一柱柱上橫延繩子一條於其繩上懸青柳枝於左柱邊布著一座呪師坐上誦呪壇中飲食盡擎棄却將其水罇移著柱下驅患牛馬過於壇中心呪師取其柳枝呪以柳枝取其罇中水次第灑其牛馬身上其病即愈金剛藏結界法印呪第三仰兩手以四指相鉤仍以右鉤左即以大指各捻自無名指甲上呪曰唵一枳唎枳唎二跋折囉藥叉三盤陀盤陀四𤙖五訶上六是法印呪若作金剛法當作此印呪結界護持然後作法一切無畏若以是呪印或呪灰水白芥子等皆須以印印拄呪之三遍七遍並皆得用若於四方及之上下所有一切諸惡鬼神悉散出去後作前印更重結界起立正面向東從身左邊以左脚頭在前竪著次以右脚橫博左跟如丁字形而行右轉每至一會一匝頭時及之門戶皆作金剛大瞋形勢怒眼䶧齒面作瞋色如是三匝後用軍荼利大身法重結其界是法成就金剛藏法身法印第四亦名五股印也反鉤二無名指在掌中右押左合掌以二中指二小指直竪頭相拄二頭指小曲附中指側二大指直竪並著頭指來去呪同前護身呪是一法印若有人受持金剛法者日日洗浴著新淨衣而作此印誦前護身呪在於佛前供養一切諸佛菩薩諸佛菩薩常生歡喜感得十方一切金剛常來加護助行者力金剛藏心法印呪第五反叉左右頭指已下四指在掌中左大指直申右大指屈入掌中合腕呪曰唵一跋折囉直迦二三摩咩鳩魯輕呼三莎訶四是法印呪若欲作一切金剛法者先請金剛安置坐竟即作此印誦呪後作金剛法者皆得有驗金剛藏散華法印呪第六兩腕側並二大指各捻二小指甲上以二無名指側頭相拄二中指頭指各直向前磔竪不相近呪曰唵一跋折路二波婆去音夜三莎訶四是法印呪若欲供養金剛無香華時當作此印而誦呪者一切金剛皆悉歡喜金剛藏吉唎法印呪第七亦名須婆印呪唐云印王反叉後二指於掌中竪二中指頭相拄兩頭指各屈在中指背離中指一分許不著並二大指各捻中指中節上頭指來去呪曰唵一蘇雄二合去音婆上音儞二蘇雄二合去音婆上音三嗚𤙖吽吽吽四泮泮泮泮五莎訶六是法印呪若能日日在於佛前及道場所而作此印誦呪之時常得一切金剛歡喜若供養竟發遣一切佛菩薩已呪師即以右手大指與無名指捻取少灰呪之七遍用點頂上及左右膊心頸眉間髮際等上名作護身一切無畏一切鬼神不得近人又以此印治一切鬼病若欲臥時洗手漱口即用此印呪三七遍護身臥者夜臥之處一切不畏若人夜夢共女交通失不淨者取五色線而作呪索一呪一結如是結滿一百八結著新淨衣用前呪索繫其腰上護身誦呪而臥眠者即無此事又用此法而作結界又作此法一切歡喜金剛藏呪王印呪第八反叉後二指在掌中並竪二中指頭相拄小曲二頭指各在二中指背頭當中指第三節背莫著少許並二大指頭捻中指第二節頭指來去呪曰唵一蘇皤二合悉地二合迦囉二囉上音叉初沙反三莎訶四若呪師日日作一切供養法時發遣已竟以右手大指無名指捻灰少許呪七遍已如前點頂左膊右膊心上頸下眉間髮際而護身者一切無畏金剛藏大身法印呪第九左右二手總反叉後四指在掌中以二大指屈入掌中露節背二肘向下相拄呪曰那上音謨上音跋折囉西上音若若冶反下同耶一薩婆帝哩二合盧迦吉阿反奢闍二合若耶二鉢羅涉筏二合唎多奢闇二合若耶三跋折囉迦那迦四目底伽稜輕呼吉唎二合多五設唎二合囉去音耶六摩訶婆羅去音耶七摩訶毘陀地夜反耶八翳醯翳醯九緊之囉也栖十婆伽婆上音底十一跋折囉跋尼必唎二合曳十二摩訶跋折囉娑儞醯十三阿那去音夜阿那