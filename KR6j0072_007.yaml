縛八部諸大惡鬼都攝一千六百諸金剛印都身印第五十三丹第三十五右手無名指入左手無名指背右中指小指在下列左腕右手頭指相拄左手小指頭右手中指共左手頭指相鉤右手小指共左手頭指相鉤左大指入右小指無名指岐右大指押左頭指第二節背下此印總縛一切諸鬼又攝六百諸小印等身印第五十四丹第三十六右手中指入左手無名指背橫出列左腕右手頭指拄左手小指右手大指拄左手頭指右手無名指小指向左手掌中及出左大指向外掌出此印總攝八百小印此印亦用縛一切鬼又召請隨心印第五十五丹第三十七以右手掌押左手背向下相叉左手五指來去棒印第五十六丹第三十八反叉二小指在掌中無名頭指相叉右押左合腕二大指竝押二頭指上捉疰印第五十七丹第三十九右手四指把捲大指押上左手亦爾右捉矛助左手捉痛處大惡都身印以下六印與大隋大業八年十二月八日三藏曇摩岌多於洛陽上林苑譯印文異印同金剛藏受法壇若有沙門若婆羅門善男子等專心愛樂我是祕密法藏神呪功德之時可於十月十三日或復臘月十五日清淨之處或於露地或在室中當淨修理其地如上所說佛菩薩法一種無別莊嚴道場懸諸幡蓋種種寶物莊嚴之具具辦種種華香之類於道場中作方四肘五色法壇其壇四角四門各著一口新淨水罐其壇中心作蓮華座其壇中心亦著一罐其火鑪邊亦一水罐其五罐等各滿盛淨水兼著五穀於其罐口各以柏葉梨枝塞之仍各生絹三尺繫上迎金剛像安著中心水罐之後若無畫像作印法請金剛安置亦得無咎次第安置四十九燈五十盤中盛種種食又以薰陸香沈水香安悉香是三種擣共和為丸大如小棗一千八丸及燒胡麻粳米酥蜜乳酪等物其壇西門南置火鑪其鑪入地作之四面各一肘深一肘其火鑪中畫作蓮華種種辦訖香湯洗浴著新淨衣入道場中作印護身結界畢已作印召請金剛菩薩安置坐竟先作華香法事供養次作諸法印呪供養次燒胡麻粳米酥蜜相和供養一如上法然後取前香丸用大心呪一一各別呪七遍已投火中燒如是燒盡一千八丸當爾之時金剛像上現金剛藏王菩薩之身問行者言汝欲何法是時行者即把香鑪隨意報答時金剛藏王滿其願已忽然不現行者當時即得其驗供養畢已次第取其壇中水罐出道場外詣水壇上次第灌其受法人頂各灌頂已著新淨衣引入道場頂禮佛已與作護身一如上法發遣金剛藏王菩薩掃除處所殘食散施一切眾生爾時佛告金剛藏等菩薩摩訶薩眾言汝等眷屬今獻諸呪微妙甚深希有祕密法藏得有如是利益之事我亦從昔已來曾學是法皆得成就汝等亦須堅持梵行常無退轉得無生法忍歸佛法僧恒巡六道而作護念勸發菩提莫辭勞憚由是汝等誓願力故我等讚成一切歡喜時諸大眾聞佛印可皆大歡喜作禮而去
