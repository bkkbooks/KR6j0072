毛作索結已繫其項上又呪病人耳孔之時即得解脫若其不差又以瞋心呪金剛杖以杖打地其作病鬼皆來首伏合掌乞命云更莫打今日身心五支碎痛但乞放捨更不敢來又欲得學一切經論一切伎藝日日旦起誦呪一遍繫心不絶其法即成一日誦得五百偈經一切所求但瞋怒誦無不諧允其金剛杵橫九指長若用赤銅若白檀作若棗木心隨一皆得其中紫檀最為第一跋折囉吒訶娑功能如此所治之病如湯沃雪亦如猛火燒諸乾草
