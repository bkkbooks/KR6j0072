body:
  text: 大唐天竺三藏阿地瞿多譯金剛阿蜜哩多軍茶利菩薩自在神力呪印品印有二十一呪有十五十四呪是主一呪是伴爾時世尊與軍茶利烏樞沙摩等共會宣說是大自在威力陀羅尼法印神呪時三千大千世界六種震動毗那夜迦諸惡鬼神等不信敬者生大驚怕欲走入山不得而去復欲入海亦不能去無處藏避走至佛所頭面著地請佛救護佛言住住汝等莫怕金剛打爾頭作七分汝等曾聞摩訶畢伽那王昔在於彼悉遮山中已被金剛打殺摧碎汝憶此不我此金剛有大力故若復有人誦持諸佛般若菩薩金剛天等呪法印等日日供養廣為懺悔及欲救護一切衆生厄難之時汝等鬼神皆護助力不得惱亂若有人等憶念此呪印等法者汝等好看勿使一切惡鬼神等得便惱亂若復有人誤食酒肉五辛等味錯食不淨鮮血食者汝等亦忍不得惱亂汝等若能不違我語當令汝等得免如是怖畏之難爾時伽那王白佛言世尊若有人等誦持諸佛般若菩薩金剛天等神呪印壇常能護行諸佛法要廣設供養我等眷屬受佛教敕不令一切惡鬼神等作諸障礙若復有人誦持佛呪及作印法曼茶羅者常能供養十方諸佛般若菩薩金剛天等我等護念若令誦呪人起種種想或令其病或令眼暗或念財色由是想念不令衆生日日入壇而誦佛等陀羅尼呪及作法印設使誦持徒然無驗皆由諸想不能成就若復有人或以燒香散花設食作諸供具為欲供養遂被鬼神偷盜將去使誦呪人作法不成如是等事我悉擁護所有惡魔鬼神等輩隨逐人者我悉遮護不令隨逐或復有人誦持我佛正法呪印有時誤犯錯食雜味及其食中有諸不淨辛葷血器臭穢氣者或復設與女人交雜我悉不為障難所惱皆由我護行法人故爾時金剛藏言若復有人受持諸佛法印呪者恐諸不淨之所染著懼犯前事當勤洗浴時宣禁戒每日平旦誦呪七遍食時亦爾即破一切所有障礙所作之法一切無畏悉皆成辦爾時金剛軍茶利菩薩等於佛會中說此祕密方便法已一切諸佛菩薩摩訶薩等皆悉印可同時贊成我等心願如汝所言汝等皆當信受作禮敬奉修行金剛藏軍茶利菩薩自在神力法印呪品軍茶利香爐法印第一用小心呪仰左右手掌兩手中指無名指小指直向上竪背各相著二頭指斜直頭相柱二大指舒頰頭指第二節呪曰唵一阿上音蜜哩二合帝二嗚𤙖三㧊四是法印呪若作一切金剛法事先以此印印香爐已誦小心呪滿三七遍然後燒香一切歡喜軍茶利香水法印第二用小心呪右手五指相博並直竪向前以左手向外握右手腕下是一法印若於供養法會壇中以寶盆宬水而著雜華及香末等作此印已印之呪水安置佛前一切歡喜軍茶利護身法印第三用大心呪相叉二小指於掌中以二無名指雙屈入掌中捺於二小指叉上合腕竪二中指頭相拄兩頭指小屈曲當中指背上節後勿著之呪曰唵一戶嚧戶嚧二底瑟吒二合底瑟吒二合三盤陀盤陀四訶去音那訶去音那五阿上蜜哩二合帝六烏𤙖㧊七誦呪七遍是法印呪若但有人常欲受持金剛法者每日平旦灑手面已即以右手掬於淨水呪七遍竟向東散却三遍㧊之後㧊己身即入房內作護身法護身法者當燒香已結印不解口誦心呪將印頂戴次印左肩次印右肩次印心前次印頸下次印眉間次印髮際次印頂上次印頂後如是八處各三遍印是名護身法凡人欲作金剛法事先印香爐燒香已竟手把香爐啓告十方一切諸佛般若菩薩金剛冥聖諸天業道一如上法啓告已訖即作此法然後行用一切無畏至於作法誦呪無難軍茶利辟除毗那夜迦法印呪第四左手大指屈橫在掌中以左中指及無名指握其大指又以頭指及小指努屈向外使頭指頭到中指中節側令小指頭到無名指中節側即舒其臂向右轉之誦呪七遍正作法時以右手大指捻小指甲上反叉腰右側三指頭申向前呪曰唵一虎𤙖二訶上音那上音社那麼他三毗馱崩二合娑上音夜四烏蹉二合馱去音耶五嗚𤙖㧊㧊六是法印呪悉能辟除一切藥叉毗那夜迦若佛若般若若菩薩若金剛隨其欲作法會之所皆須先作此印誦呪一切諸惡悉即散去成辦諸事一無怖畏猶如國王動止儀式先當辟除然後動止此亦如是此印及呪若房內用印向頭上右轉三匝誦呪七遍若作壇時作步臂行繞壇三匝從外行之先起右腳次舉左腳呪三七遍多誦亦好軍茶利金剛一字降魔王印呪第五二小指掌中相鉤右壓左二無名指於中指背後相交二中指直竪頭側相拄二頭指鉤二無名指頭二大指捻二中指頭齊以二中指大指頭拄頂上面作瞋色呪曰唵一䐗嚧嚧嚧嚧二𤙖𤙖三㧊四若造一切曼荼羅處先結此印誦呪繞壇行道七匝一切魔王普皆歸伏軍茶利結地界法印呪第六先以右中指於左頭指中指岐間向背出頭次以無名指於左小指岐間亦爾左中指內向右頭指中指岐間向內出頭次以左無名指於右小指間亦爾兩小指頭指竪合頭二大指亦合頭頭向下若作法時大指合頭著地翼兩臂肘呪曰唵一吉唎吉唎二跋折囉覆知二合三盤陀盤陀四嗚𤙖五訶上音六是法印呪能除地中徹金剛際一切諸惡鬼神等輩若處法會壇場之所當作此印誦呪七遍以印拄地能令地上及於地下乃至徹金剛際所有一切諸惡鬼等皆悉散去無能作害軍茶利結四方界法印呪第七准前地印唯改開二大指相去二寸指頭向身直竪努指向右轉之呪曰唵一薩囉薩囉二跋折囉三波囉二合迦去音囉上四嗚𤙖五㧊六是法印呪能除四方一切惡魔諸鬼神等若處法會壇場之所當作此印誦呪七遍即以此印向於四方隨日右轉所有一切藥叉鬼等皆悉退散軍茶利結虛空界法印呪第八亦名上方結界准前地印唯改二大指各附著頭指側上即以此印向於頭上右旋三匝呪曰唵一毗悉普二合吒囉上音叉上音二跋折囉三半闍囉四嗚𤙖五㧊六是法印呪能除虛空上至有頂一切諸魔惡鬼神等不敢惡念即以此印舉向頭上右旋三匝誦呪七遍天上虛空一切飛行藥叉鬼等皆悉退散若大道場法壇之會皆須如是三遍七遍印呪結護第一先當擇得勝地未立規郭即為一遍結界辟除第二治地平正堅實香泥塗地且將少分名香好花供養之時又作一遍結界辟除第三竪立拄額規郭懸諸幡蓋鈴珮等已又將少分名香好華而為供養行道之時又作一遍結界辟除第四布置色粉花座開諸位地又作一遍結界辟除第五將燈入壇安已又作一遍結界辟除第六將於水罐華香飲食酥蜜胡麻粳米等供所有一切供養之物盡入道場總安置訖亦作一遍結界辟除第七欲請諸佛般若菩薩金剛天等未請以前復作一遍結界辟除結界中間一一皆結大身法印把跋折囉護界降伏大魔衆已次第而作一一身法次以右手把於香爐右繞三匝作結護界心標供養一切動止威儀皆須具諸法相於後所為供養一切諸佛般若一切菩薩一切金剛一切冥聖一切諸天一切業道皆大歡喜然後一一各作本印誦其本呪迎請供養是結界法猶如國主人王動止法用威儀一種無異軍茶利身法印第九用小心呪相叉二小指於掌中以二無名指雙屈入掌中捺於二小指叉上合腕竪二中指頭相拄二頭指屈捻中指上節上二大指並頭捻中指中節上頭指來去是一法印若人欲作軍茶利法而為供養及欲治病皆作此印請喚來去軍茶利香花供養法印第十用大心呪以二無名指二小指相交叉右壓左在掌中仍屈向腕即舒中指斜頭相拄以二頭指各捻中指第三節上以二大指各附二食指側合腕是一法印若在在處處道場法壇當作此印將以一華及一丸香而置印中作是印已誦呪供養若無香華直作是印而供養者一切金剛皆悉歡喜軍茶利飲食供養法印第十一用大心呪准前香花印唯改二小指二無名指挺在掌中開掌是一法印若於壇上擬獻飲食皆以此印印一一盤一一呪已然後入壇安置供養若無飲食直作此印而為供養亦得一切金剛歡喜軍茶利燈法印呪第十二以右手後二指屈在掌中直竪中指其頭指亦屈向掌中大指屈中節壓頭指上節上大指頭側捻中指中節上呪曰唵一毗嚧吉儞二莎訶三是法印呪若於壇中及道場內為供養者一一燈上皆作此印印之誦呪然後安置軍茶利頭法印第十三用大心呪准前身印唯改二頭指平屈中節各捻大指頭使頭相拄大指離中指並竪是一法印若人頭痛作此印已印其痛處呪柳枝打其病即差軍茶利頂法印第十四用大心呪准前身印唯改二頭指各㧙在中指背指頭相拄中指在內是一法印亦名縛鬼印若作是印隨意欲縛一切鬼神應時被縛鬼病即差若欲解放解其頭指將中指內來已心想放之即解又若有人患頭痛者作此印已印其痛處誦大心呪又呪柳枝打其痛處其痛即差軍茶利牙法印呪第十五用大心呪呪病亦得以左手小指㧙於無名指根背上次以中指屈從無名指後㧙壓小指背上仍屈其上節與無名指相側著次以食指屈中節壓著小指甲指頭向掌與無名指相側著次以大指斜捺頭及中二指甲上亦與無名指相側著無名指直竪向上去一切毗那夜迦作此印呪七遍三回右轉右手把拳打轉拳呪曰唵一烏吽二訶那杜那三末他毗闍四結舍夜五蹉囉夜六㧊七是法印呪若人卒得心痛鬼疰及中惡者即作此印印其痛處即誦此呪四十九遍其痛即差或誦大心呪四十九遍其痛立愈此法大驗若治鬼病縛鬼之時病人口中即吐出血治一切病若用牙印數數誦呪向官府所官人歡喜憂事解散軍茶利跋折囉總印第十六用大心呪以左手大指捻小指甲上餘中頭無名二指皆直竪向上磔散是一法印但為法會壇場之處所有擬獻香花燈明所有飲食一切供具一一皆以此印印之若有跋折囉用跋折囉一一印之不須此印若無跋折囉方用此印印諸供具一切諸惡鬼神等輩不敢犯觸作此供養金剛歡喜大小心呪皆通用得若婦人患月水恆出及男女人鼻孔血出者取囉上音娑善那人莧菜根各取二兩粳米泔汁及蜜共和為丸訖誦前心呪二十一遍分為小丸大如梧子如法服之其病即差此名阿伽陀藥更有一方名同取沙糖鬱金華及酥搗和如膏相似若患鼻塞及鼻中臭又不得臭香臭等氣即以前藥灌之即差若患半日頭痛即以前藥摩之即差若人患眼即以藥摩眼瞽上下其眼即差又若有人旦起頭痛日西便好摩之即差餘准可知若人不能食萎黃眼黃腹中氣塊大喘息不得咽喉大痛取石鹽阿魏藥訶梨勒茴香子乾薑蓽鉢胡椒七味等分各取半兩共搗為末用沙糖和以為丸丸如棗大空腹一服服別一丸無所禁忌大肥好顏色豐足氣力皆以牙印印上諸藥呪百八遍然後方服軍茶利大心呪第十七呪曰唵一戶盧戶盧二底瑟吒二合底瑟吒二合三盤陀槃陀四訶上音那訶那五阿上音蜜哩二合帝六嗚𤙖七㧊八軍茶利中心法呪第十八呪曰唵一杜那杜那二嗚𤙖三嗚𤙖四㧊五㧊六莎訶七軍茶利小心法呪第十九呪曰唵一阿上音蜜哩二合帝二嗚𤙖三㧊四是小心呪若人中毒卒死者手捻耳挽口就耳呪二十一遍呪水七遍呪水散面二十一遍與服即穌名甜水閃子被箭諸天用此呪水與其灑瘡即得瘡差亦得解污灑浴身體入佛堂用皆得佛前誦一千遍通師本有莎訶是三法呪護身作法乃至一切香花果子燈油飲食治病壇中諸供養具及諸法事皆用此呪呪之即得一切成就軍茶利大護身印第二十用後大呪起立正面向前以左大指押小指甲上餘三指直磔竪捺右腋邊臂上次以右手法同左手亦捺左邊臂上然後縮左腳以掌捺右膝上怒眼怒口作大瞋形是法身印但立壇之處皆作此印鎮於四方及鎮四門作法皆成若欲治病去先於房內作此印法護身而去若病人見生驚動者其病易差若不驚動其病難差若可可病遙見即差若病人家遣使問師師作此印誦呪臥時夢中若見佛及菩薩金剛天等其病得差呪師即去若見驢馬等及裸形人如外道等其人即死呪師莫去若見銅碗鐵等物者其病不差呪師莫去軍茶利大瞋法身印第二十一用後大呪起立以左腳指向左邪屈膝立之右腳指向前身側立先以右手屈大指在掌以後四指把拳壓在左腋下次以左手亦如右手把拳壓在右腋下頭少向右邊向左亦得眼側看作大瞋形是法身印若有一切難治之病諸惡神鬼不伏退者當作此印繞病人三匝斜身膝如跪地起大瞋色誦後大呪呪聲莫絶三匝繞作一切皆散病即得差如其不差即非鬼病若其病人不至心者其病不差若作壇處結界時用大有靈驗軍茶利大降魔法身印第二十二用後大呪起立乃縮兩膝腳跟相拄以左手虎口反叉腰四指向前母指向後右手把跋折囉竪臂大努若無跋折囉即握作拳如金剛把杵作大瞋面誦後大呪若竪大指名把斧印是法身印但作壇處及治病所當作此印降伏一切惡魔鬼神隨其所為金剛法事悉皆成辦軍茶利三眼大法身印第二十三用後大呪仰兩手掌後三指相叉右壓左以二頭指斜竪頭正相著各屈大指捻中指側上節反掌掌向外將上以頭指指頭向下齊眉上著起立以右腳正踏地縮左腳正齊右膝腳掌向下如踏勢以腳跟拄著膝上即努眼視作大瞋面頭如向前是法身印若作一切壇法之所結此印已一腳行道繞壇三匝一切無畏所作皆成若治病處於病人邊作是印已誦後大呪其病即差一切壇處不解如是一腳行法一切壇法皆悉不成軍茶利大法呪第二十四呪曰那上音謨上音囉上音怛那二合跢囉二合夜耶一那謨同上室旃二合茶跋折囉波輕呼拏曳二摩訶藥叉栖那波跢曳三那謨同上跋折囉骨平音嚧二合馱去音耶四儞知夜二合鉢羅涉筏二合唎多五婆去音羅地富多六屋伽囉二合鄧瑟都二合嚧嚧地二合羯吒七皤耶鞞羅皤去音耶八阿上音私謨娑上音羅九跋折囉婆去音羅十輸婆去音舍訶悉馱去音二合耶十一跢姪他十二唵十三戶盧戶盧十四阿上音蜜哩二合多軍茶利十五佉佉佉佉皆上音十六呵那呵那十七訶上音馱訶上音馱十八呵醯呵醯二醯皆上音十九底瑟吒二合二十底瑟吒二合二十一底同都爾反訶那訶那二十二馱訶馱訶二十三跛者跛者二十四訖柳二合噓拏二合二十五訖柳二合噓拏二合二十六盤陀盤陀二十七揭嘞二合闍二十八揭嘞二合闍二十九怛嘞二合闍三十怛嘞二合闍三十一毗悉普二合吒上音耶三十二毗悉普二合吒上音耶三十三婆伽梵三十四阿上音蜜哩二合多軍茶利三十五慕鬱二合檀茶平音耶三十六跋折唎拏三十七薩婆覩瑟吒二合比怛那二合三十八毗那耶伽去音那三十九儞波囉二合拏去音耶四十摩訶伽那鉢底四十一是比彈去音陀羯囉去音耶四十二嗚𤙖嗚𤙖四十三㧊㧊㧊四十四唵四十五俱嚧陀四十六迦拏曳四十七莎訶四十八是大法呪若有法壇及療一切諸鬼神病皆須作前四種身印結護界已一切魔鬼悉皆降伏四散馳走若有人能如法受持誦是呪滿十萬遍者一切皆得隨意成辦治病大驗如前所說四種身印同用是呪作諸法事悉得成辦唯不至心一無所驗又軍茶利大呪第二十五呪曰那上音謨上音囉上音怛那二合跢囉二合夜耶一那謨同上室旃二合茶跋折囉波拏曳二摩訶藥叉栖那跛哆曳三那謨毗摩羅涉伐囉二合四迦那迦沙怒迦迦那五阿蜜哩二合多三婆皤上音曳六囉上音怛那二合迦去音那謨量怒唎婆去音羅八毗唎二合耶夜跋折囉傍上音儞九毗唎二合耶夜跋折囉傍上音儞十覩囉訶十一毗迦耶提婆十二那上音伽十三藥叉十四囉剎娑十五婆去音羅跋底儞那十六唵十七阿上音蜜哩二合多軍茶利十八却却却却十九却那却那二十却號却號二十一底瑟吒二合二十二底瑟吒二合二十三拔那拔那二十四訶那訶那二十五馱訶馱訶二十六鉢吒鉢吒二十七薩婆比怛那二合毗那夜迦耶㧊二十八舍咄嚕二合唎陀閻㧊二十九藥叉𠼝陀閻㧊三十羅剎娑𠼝陀閻㧊三十一摩羅摩囉剎娑𠼝陀閻㧊三十二薩婆羯囉二合訶𠼝陀閻㧊三十三薩婆者迦吒迦𠼝陀閻㧊三十四薩婆婆榆沒咄鼻標𠼝陀閻㧊三十五跢姪他三十六陀訶陀訶三十七鉢吒鉢吒三十八阿比奢三十九阿比奢四十唵唵唵長引三同四十一㧊㧊㧊四十二跋折囉波儞四十三囉上音怛若二合波夜底四十四莎訶四十五是一大呪悉能辟除一切障難若人意欲受持此呪日日香湯淨灑浴已著新淨衣自護身竟入道場中而作水壇縱廣四肘嚴飾壇法如餘部說莊嚴已竟即作結界其壇中心安軍茶利金剛之座若有其像將迎安置若無其像標心作印請坐亦得散種種華燒安悉香數數誦呪滿十萬遍以後淨處作五色壇嚴飾如前餘部中說入此檀中散種種花燒種種香種種飲食燈明等供而用供養發願誦呪呪酥蜜等火爐中燒若百八遍若千八遍供養乃至一七二七日數滿已即果所願以後隨心所作皆成治病大驗降伏一切惡魔鬼神惡人非人不能為害軍茶利三摩耶結大界法印呪第二十六亦名一切佛摩訶三昧耶印呪以二小指二無名指交叉右壓左挺在掌中直竪二中指斜舒直頭相拄以二頭指各屈捻中指第三節背以二大指各附博二頭指邊側開掌呪曰唵一商迦上音禮二摩訶三昧焰上音三盤陀盤陀四莎訶五是法印呪若有建立道場壇所請一切佛般若菩薩金剛天等欲供養者聖衆若到一一各作華座印呪承迎安置本位總竟然後作此法印誦呪以印右轉三遍七遍皆得稱為靜警是名內外嚴密之法作是法已聖衆皆安坐受供養呪師不解作此法者多有諸惡魔神外鬼毗那夜迦等之所得便即不安隱治病亦爾而作種種供養法事總事已竟又作是印更呪七遍但誦前呪盤陀盤陀次下更加文闍文闍始云莎訶以印左轉轉至三匝誦呪七遍此名解散亦名開鎖若不依是法用之者呪師得殃譬如國王命諸群臣而為宴會遣諸兵將守捉街道門戶牢密無人得入事畢將散亦復如是軍茶利使者法印呪第二十七印與般若使者印同大指來去呪曰唵一𠯖嚕𠯖嚕二揭囉闍三揭囉闍四訶那訶那五莎訶六是一法呪若欲使其使者治病即誦此呪若留使者遣看病者亦誦此呪若用軍茶利法治病之時即遣使者看其病人若軍茶利住使者得去若軍茶利去使者即住如是更互皆悉有驗軍茶利金剛受法壇若欲受持軍茶利法先畫其像遍身青色兩眼俱赤攬髮成髻其頭髮色黑赤交雜如三昧火焰張眼大怒上齒皆露而咬下脣作大瞋面有二赤蛇兩頭相交垂在胸前頭仰向上其兩蛇尾各穿像耳尾頭垂下至於肩上其二蛇色如黃侯蛇赤黑間錯其像有八臂手右最上手把跋折羅屈臂向上下第二手把長戟拄屈臂向上其戟上下各有三叉皆有鋒刃一頭向上一頭拄地下第三臂壓左第三臂兩臂相交在於胸上右手中把兩箇赤蛇其蛇相交各向像面左手亦把一頭赤蛇兩手各作跋折囉印兩手大指各捻小指甲餘指皆申即以左手壓右腋前次以右手壓左腋前即是身印下第四臂仰垂向下勿著右𦜮五指皆申施無畏手左上手中把金輪形屈臂向上輪有八角轂輞成具下第一手中指以下三指各屈向掌大指捻中指上節側頭指直竪向上申之屈其臂肘手臂向左下第四手橫覆左𦜮指頭向右八手腕中皆著金釧以紫色地散花錦天衣絡髆項背令其天衣頭分左右各垂向下將以緑表肉紅裹帶用繫其腰虎皮與錦鞔其兩𦜮其兩腳脛各有赤蛇絞其腳脛其兩蛇色赤黑間錯仍令其像立於七寶雙蓮花上其右腳指還向右邊其左腳指還向左邊其像左邊踝子以下畫一鬼王身似人形軀貌麁大作白象頭屈膝跪坐舉頭向上瞻仰像顏其鬼右手把蘿蔔根屈臂向上左臂平屈展手仰掌把歡喜團其手兩腕皆著金釧其鬼頸下著金纓絡將以緑帶繫其腰上以朝霞錦鞔其兩𦜮畫此像已覓一淨房佛堂亦得當於其中燒香啓白掘去惡土瓦石糞等更將餘處淨黃土來填其掘處堅築令平四面正等呪師即以香湯洗浴著新淨衣施主亦然與其建立懺悔罪障受法道場其道場地先以香泥塗之一遍次即結界作法事訖次以佉陀羅木作橛四枚枚別各長橫量八指用大心呪呪其橛子一百八遍即於其地四角釘之其四角橛一釘已後永莫拔却呪白芥子亦復如是即於四方及其中央各穿作孔深一搩許埋其芥子後以牛糞香湯和已更塗其地塗一遍已又更結界次立道場隨意闊狹懸諸幡蓋及諸寶物極令嚴淨更作一遍結界法事即以少分花香供養行道已竟發遣金剛既發遣已當道場中以五色作四肘法壇言五色者所謂一白二黃三赤四青五黑欲作壇時更以種種名香和水以大心呪呪其香水一百八遍用塗其地待湆乾即用粉繩而拼其地四方正等作規界已先下白粉次黃後赤次青後黑其壇中心作蓮花座安軍茶利金剛形像東面安置三跋折囉南面北面亦如東面四角各安二跋折囉各相交叉如十字形於西門內南北兩相各別安置二跋折囉其上各安飲食供養其食皆須種種餅果具足十盤四面四盤四角四盤中心一盤外著一盤施與一切諸鬼神等燈五十二盞若不辦者用十六盞中心四角各著一盞外院四角各一盞燈四門兩邊各一盞燈四角各竪一口大刀四門當中各竪一箭中心仰著明鏡一面呪師在於西門面向東坐呪師南邊安一火爐擬燒酥蜜乳酪胡麻粳米等物其呪師前敷淨布已布上安置種種香花及飲食等總安置竟更結界已呪師誦呪印其香爐手把香爐燒香啓白法用如前即作護身辟除結界召請等法一依如前十一面說即把香爐先當供養阿彌陀佛次當供養東方一切諸佛菩薩金剛天等梵釋四王乃至十方亦復如是總供養已放著香爐至心三禮次散一切上妙香花次當行道次燒酥蜜飲食等物而為供養若其日日無有香花飲食等物可供養者即作一切供養之印而供養之其印如前般若部說呪曰唵一薩婆菩馱阿提瑟恥二合帝二悉頗二合囉醯上音迷三伽伽那去音劍平音四娑縵馱五莎訶六次作般若印當心上著口說三業所犯之罪發露懺悔正坐莫動數數禮佛口讚歎云諸佛智慧大勇精進那羅延力般若波羅蜜多等功德之行次發願云願弟子等若在人中常聞大乘法及陀羅尼印等法藏不見惡事不聞惡法不遇外道諸惡人等不遭九橫若命終時十方淨土隨意往生常見諸佛一切衆生亦復如是發是念已誦大心呪一千八遍及次第作當部法印而為供養從此已後日日每旦洗手面訖口嚼楊枝揩齒淨已誦小心呪呪手中水滿七遍已向東散之如是三遍然後更呪手中淨水滿七遍已散灑頭上後為洗浴如其緣事不得洗浴直作灑水法事結淨然後入房作護身竟入道場中如是供養如不能辦日日飲食空用香花作供養印供養亦得要須夜別一時供養懺悔日別三時誦呪乃至滿足一百萬遍數滿足已散去法壇更作泥飾還如初時安置法用一夜供養作法事竟擎取其壇中心水罐出於道場西門之外又更別作一小方壇壇上安置一小床子令受法人坐床子上以水灌於受法人頂當灌頂時其受法人心口發願灌頂畢已著衣入於道場之內一一次第作印發遣是故常得軍茶利金剛護念一切行用皆有靈驗軍茶利金剛救病法壇若有人著鬼神病者於病人家如法莊嚴道場畢已即著施主上好衣服與作四肘二色彩壇一白二赤壇開四門五方各畫二跋折羅十字交著其壇四角各竪長刀一口四門各竪好箭一隻中心安鏡一面仰著種種飲食共宬十盤四面四盤四角四盤中心一盤壇外一盤施與一切鬼神燈十二盞香水娑羅一壇外西南別泥一所小圓壇子著一盤食安一盞燈與一切鬼神大壇中心著一水罐滿宬淨水以青柏葉青竹柳葉以生絹束插其罐口限三日內在於壇所誦前大呪以病人差為限即止唯燒安悉香若不誦呪病人還房若誦呪時還入壇內呪師病人俱斷一切酒肉五辛若其食者作法不成若不如法不淨潔者呪師病人二人俱被毗那夜迦鬼王所打不能辟除不如元來不為作法一切所有香華香水飲食等物皆呪七遍壇中所用一切物等皆亦如是呪七遍已然後入用若如是者作法即成軍茶利金剛治病法用大心呪中心呪小心呪大心呪曰唵一戶盧戶盧二底瑟吒二合底瑟吒二合三盤陀盤陀四訶上音那訶那五阿蜜哩二合羝六嗚𤙖七㧊八中心呪曰唵一杜那杜那二訶上音那訶那三嗚𤙖四㧊五小心呪曰唵一阿蜜哩二合羝二嗚𤙖三㧊金剛軍茶利在於佛前說此呪時一切鬼神皆悉戰栗地皆震動若人病患吐食不下數數低頭頭旋倒地是伏尸鬼入人身中令人作病以酥和娑羅樹脂香呪七遍已火中燒之熏病人身其病即差若不差者以白芥子呪七遍已繞身七匝乃燒火中如是燒滿二十一遍其病即差作此法者金剛大歡喜若人患心東西狂走或脫衣坐或亂髮髻或取塵土以污其身復欲行房數數喫食皆言不飽或欲相打或欲相殺赴入水火不避直進或向湯水即墮其中如是種種多端狀者決定知是鬼入身中令作此病是時呪師即與其作二肘水壇手執香爐供養十方一切諸佛燒安悉香及薰陸香二種皆得病人頭上作護身印數數誦呪其病即差一日不差二日即差若患風熱病數數驚忙或出或入心志不定又復數數視婦女時或好或惡如是病者以娑羅樹香呪燒即差若無此香當取牛黃和白芥子呪燒即差其藥常須隨身帶行天使者鬼所作之病燒前香者即得除差煙火之鬼若人誦持一切諸佛菩薩金剛天等呪者其鬼常隨伺求人便入人身中作業不成令人不好種種作法不成就者人定以後即用淨酥然一盞燈呪三七遍將此燈盞安置床底以鉢覆燈用左腳踏覆燈鉢上誦呪七遍所在治病不畏一切諸鬼神等不能障礙若不作此呪即令呪師心意所作轉變不定若人患眼淚洟唾俱出眠臥出聲如是病者還作上法其病即差若病人家遣使請喚呪師來時使到師邊若其面向西南西北此病不差亦不得去呪師莫去若被貴人喚不得已去者自作護身印至心誦呪二十一遍然後乃去到於彼處即放還來更不留連若下凡人不去最好去而無益即失名聞若病人家使到師邊若其使者以舉左手數數摩面呪師莫去若去不來貴人賤人同如前法軍茶利像宜置南方面向北坐呪師對像面向南坐治病處作二肘水壇其壇中心安一火爐呪布瑟波二合唐云花也迦囉毗囉華二十一遍投火中燒如是燒滿一百八遍所有病痛治無不差作此法者一切鬼神總皆被縛不敢作惡呪水七遍先須遍灑呪師頂上如是七遍然後乃往向病人所又呪淨水二十一遍散病人頂一遍即差若人患眼暗取迦囉毗囉樹脂唐云羊躑躅也呪三七遍以塗眼上患眼暗人即得見明也若採其葉即脂汁出又有一法以佉陀囉木作橛四枚各長八指橛別各呪二十一遍即將此橛釘著病人所住宅內四角結界若無此木呪白芥子二十一遍散病人宅四角四面結法如前若欲治病至病人處燒安悉香呪云訶訶訶三聲訶已其病即差若被毒藥入腹中者手執刀子至心呪滿一百八遍以此刀子遙畫彼人身上即差若欲遠怨家呪布瑟波二合一百八遍依於前法對於像前一呪一燒其人遠去又有一法黑月八日近窗門作四肘水壇其中安像以淨泥作摩奴沙形身長一肘令其仰臥頭南腳北呪白芥子於火中燒仍打其形即得隨意遠遠揭車若欲令彼還復舊者取白芥子共布瑟波呪一百八遍投著栴檀香水之中如是滿足一百八遍稱前人名口云急差一遍一稱即得差愈若求咩古者灑乾薑畢鉢摩唎遮唐云胡椒總搗為末以蜜臘作摩奴沙形以呪前藥內其腹中火前炙其摩奴沙形口云試迦㘕試迦㘕阿伊舍阿伊舍如是日日三遍作法乃至八日即阿伊舍婦人丈夫一種通用若知伏藏處以跋折囉日日三時時別誦呪一千八遍即打其上如是作法三日即出若不出者於其打處即有聲出掘之即得不知莫作作即不得徒費功矣若伏藏不出七日作法飲食供給誦呪即出若欲食時未食以前為軍茶利出種種食少分出已心中密誦軍茶利心呪七遍其軍茶利常隨呪師所在之處悉皆擁護若能日日作此法者金剛軍茶利心大歡喜常不遠去一切處護治病大驗若畜生病隨其種類還取其骨呪一遍已投火中燒一日三遍旦暮中時以差為限跋折囉二合吒訶娑印呪法唐云大笑金剛跋折囉吒訶娑身印呪第一先以二中指各㧙在二無名指背上二無名指頭相拄二小指開頭直竪相去一寸許二大母指壓二無名指第二節側文合腕二頭指屈頭相拄頭指來去呪曰跢姪他一唵二跋折囉吒訶娑那上音摩三醯醯四莎訶五護身印第二准前身印以二小指屈頭相拄印於頂上亦誦身呪如餘部中護身之法結界印第三先以右手中指無名指頭指反鉤左手無名指中指頭指二大母指各捻二小指甲上亦誦身呪以印印水呪七遍已灑散十方普遍結之名大結界辟除毗那夜迦印第四准前結界印上以二小指反相鉤二大母指移捻二頭指甲上亦用身呪跋折囉吒訶娑大呪第五那上音