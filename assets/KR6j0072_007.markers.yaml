  - {type: variant, offset: 11224, length: 115, content: '那上音謨上音囉上音怛那二合跢囉二合夜耶一

      　那謨同上室旃二合茶跋折囉波拏挐曳二　摩訶藥叉栖那波跢曳三　唵四　跋折囉央俱施五　迦比羅雞施六　跢智跢智七　遮智遮智八　麁智母智儞九　迦嚧＝盧【三】【甲】＊嚧【大】＊，盧【宋】【元】【明】【甲】＊嚧盧迦上音知十　摩嚧盧迦上音知十一

      　武知跋折唎十二　摩訶毘住嚕例十三　豆鳩豆鳩十四　素武', 宮: ''}
