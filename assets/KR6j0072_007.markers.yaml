  - {type: variant, offset: 9408, length: 101, content: 若人欲得跋折囉商迦羅驗者，先日日作種種供養，燒安悉香。請商迦羅安置坐竟，當誦心呪滿十萬遍，發願救護一切眾生，然後豫覓清淨之處，置立道場一如上法。其法當取（臘）＋月【三】【甲】【乙】月【大】，臘月【宋】【元】【明】【甲】【乙】月臘月十五日，香湯洗＝洒【三】洗【大】，洒【宋】【元】【明】洗洒浴，著新淨衣，於道場所懸諸幡蓋、及供養具、華、香等物備辦已竟。其, 宮: ''}
